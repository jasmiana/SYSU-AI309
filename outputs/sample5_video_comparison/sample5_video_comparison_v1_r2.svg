<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <!-- 箭头定义 -->
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D32F2F"/>
    </marker>
    <!-- 柱子投影滤镜 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <!-- 页面顶部渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="1000" fill="#F8F9FF"/>

  <!-- 顶部标题栏 -->
  <rect x="0" y="0" width="800" height="90" fill="url(#headerGrad)"/>
  <text x="400" y="55" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold">
    视频平台内容库规模对比：YouTube、TikTok、快手
  </text>

  <!-- 图表区域（Y轴范围：170 ~ 750，实际绘图高度580） -->
  <g transform="translate(0, 0)">
    
    <!-- Y轴网格线 -->
    <line x1="100" y1="175" x2="700" y2="175" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="100" y1="320" x2="700" y2="320" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="100" y1="460" x2="700" y2="460" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="100" y1="605" x2="700" y2="605" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Y轴 -->
    <line x1="100" y1="170" x2="100" y2="750" stroke="#2C3E50" stroke-width="2"/>
    <text x="80" y="755" text-anchor="end" fill="#7F8C8D" font-family="system-ui, -apple-system, sans-serif" font-size="14">0x</text>
    <text x="80" y="610" text-anchor="end" fill="#7F8C8D" font-family="system-ui, -apple-system, sans-serif" font-size="14">5x</text>
    <text x="80" y="465" text-anchor="end" fill="#7F8C8D" font-family="system-ui, -apple-system, sans-serif" font-size="14">10x</text>
    <text x="80" y="320" text-anchor="end" fill="#7F8C8D" font-family="system-ui, -apple-system, sans-serif" font-size="14">15x</text>
    <text x="80" y="175" text-anchor="end" fill="#2C3E50" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">20x</text>

    <!-- Y轴标签 -->
    <text x="40" y="460" text-anchor="middle" fill="#7F8C8D" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" transform="rotate(-90, 40, 460)">视频数量相对规模</text>

    <!-- X轴 -->
    <line x1="100" y1="750" x2="700" y2="750" stroke="#2C3E50" stroke-width="2"/>

    <!-- 柱子：YouTube（20x，高度580） -->
    <rect x="175" y="170" width="100" height="580" rx="4" fill="#4A90D9" filter="url(#shadow)"/>
    <text x="225" y="160" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold">20x</text>
    <text x="225" y="785" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold">YouTube</text>

    <!-- 柱子：TikTok（2x，高度58） -->
    <rect x="350" y="692" width="100" height="58" rx="4" fill="#7B68EE" filter="url(#shadow)"/>
    <text x="400" y="682" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold">2x</text>
    <text x="400" y="785" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold">TikTok</text>

    <!-- 柱子：快手（1x，高度29） -->
    <rect x="525" y="721" width="100" height="29" rx="4" fill="#27AE60" filter="url(#shadow)"/>
    <text x="575" y="711" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold">1x</text>
    <text x="575" y="785" text-anchor="middle" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold">快手</text>

    <!-- 比较箭头与标签（使用高对比度色 #D32F2F） -->
    <!-- YouTube -> TikTok -->
    <line x1="285" y1="431" x2="340" y2="431" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="312" y="421" text-anchor="middle" fill="#D32F2F" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold">10 times more</text>

    <!-- TikTok -> 快手 -->
    <line x1="460" y1="706" x2="520" y2="706" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="490" y="696" text-anchor="middle" fill="#D32F2F" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold">2 times more</text>

  </g>

  <!-- 底部信息栏 -->
  <rect x="0" y="900" width="800" height="100" fill="#F0F4FF"/>
  <text x="400" y="940" text-anchor="middle" fill="#95A5A6" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="13">
    数据来源：各平台官方数据估算。以快手为基准（1x）展示相对规模。
  </text>
  <text x="400" y="965" text-anchor="middle" fill="#95A5A6" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="13">
    比例关系：YouTube（20x）是 TikTok（2x）的 10 倍，TikTok（2x）是快手（1x）的 2 倍。
  </text>
</svg>