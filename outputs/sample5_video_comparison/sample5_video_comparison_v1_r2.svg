<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%">
  <defs>
    <!-- 阴影滤镜 -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#1A202C" flood-opacity="0.08" />
    </filter>
    <filter id="light-shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A202C" flood-opacity="0.05" />
    </filter>

    <!-- 柱状图渐变 -->
    <linearGradient id="grad-youtube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9" />
      <stop offset="100%" stop-color="#2C6CB0" />
    </linearGradient>
    <linearGradient id="grad-tiktok" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B68EE" />
      <stop offset="100%" stop-color="#5A4FCF" />
    </linearGradient>
    <linearGradient id="grad-kuaishou" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#27AE60" />
      <stop offset="100%" stop-color="#1E8848" />
    </linearGradient>
  </defs>

  <!-- 全局背景 -->
  <rect width="100%" height="100%" fill="#F8F9FF" />

  <!-- 标题区域 -->
  <text x="400" y="60" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#1A202C">三大视频平台视频数量对比</text>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" fill="#4A5568">全球主要短视频平台内容存量对比，以快手为基准 (1x)</text>

  <!-- 图表区域 -->
  <g transform="translate(0, 0)">
    <!-- 图表背景 -->
    <rect x="150" y="150" width="600" height="600" fill="#FFFFFF" rx="8" filter="url(#drop-shadow)" />

    <!-- Y 轴网格线 -->
    <!-- 1x 基准线 -->
    <line x1="150" y1="720" x2="750" y2="720" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4" />
    <!-- 5x 网格线 -->
    <line x1="150" y1="577" x2="750" y2="577" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4" />
    <!-- 10x 网格线 -->
    <line x1="150" y1="435" x2="750" y2="435" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4" />
    <!-- 15x 网格线 -->
    <line x1="150" y1="293" x2="750" y2="293" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4" />
    <!-- 20x 网格线 -->
    <line x1="150" y1="150" x2="750" y2="150" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4" />

    <!-- Y 轴网格线标签 -->
    <text x="130" y="726" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">1x</text>
    <text x="130" y="583" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">5x</text>
    <text x="130" y="441" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">10x</text>
    <text x="130" y="299" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">15x</text>
    <text x="130" y="156" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">20x</text>

    <!-- Y 轴标题 -->
    <text x="60" y="450" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#718096" transform="rotate(-90 60 450)">相对视频数量 (以快手为 1x)</text>

    <!-- 坐标轴线 -->
    <!-- Y 轴 -->
    <line x1="150" y1="140" x2="150" y2="750" stroke="#4A5568" stroke-width="2" />
    <!-- X 轴 -->
    <line x1="150" y1="750" x2="750" y2="750" stroke="#4A5568" stroke-width="2" />

    <!-- 柱状图：快手 (1x) -->
    <rect x="170" y="720" width="120" height="30" fill="url(#grad-kuaishou)" rx="6" filter="url(#light-shadow)" />
    <!-- 数据标签：1x -->
    <text x="230" y="705" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1A202C">1x</text>

    <!-- 柱状图：TikTok (2x) -->
    <rect x="350" y="690" width="120" height="60" fill="url(#grad-tiktok)" rx="6" filter="url(#light-shadow)" />
    <!-- 数据标签：2x -->
    <text x="410" y="675" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1A202C">2x</text>

    <!-- 柱状图：YouTube (20x) -->
    <rect x="530" y="150" width="120" height="600" fill="url(#grad-youtube)" rx="6" filter="url(#light-shadow)" />
    <!-- 数据标签：20x -->
    <text x="590" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1A202C">20x</text>

    <!-- X 轴标签 -->
    <text x="230" y="780" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1A202C">快手</text>
    <text x="410" y="780" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1A202C">TikTok</text>
    <text x="590" y="780" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1A202C">YouTube</text>
  </g>

  <!-- 洞察区域 -->
  <g transform="translate(100, 840)">
    <rect width="600" height="110" fill="#FFFFFF" rx="12" filter="url(#drop-shadow)" />
    <text x="300" y="35" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#4A90D9">📊 核心洞察</text>
    <text x="300" y="65" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" fill="#4A5568">以快手为基准 (1x)，YouTube 视频量是快手的 20 倍，TikTok 是 2 倍。</text>
    <text x="300" y="90" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" fill="#4A5568">YouTube 内容存量断层领先，全球视频内容长尾效应显著。</text>
  </g>
</svg>