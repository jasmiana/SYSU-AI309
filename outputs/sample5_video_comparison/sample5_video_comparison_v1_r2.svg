<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1060" width="800" height="1060">
  <defs>
    <!-- 标题渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A5276" flood-opacity="0.08"/>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95A5A6"/>
    </marker>
  </defs>

  <!-- 全局背景 -->
  <rect x="0" y="0" width="800" height="1060" fill="#F4F6F9"/>

  <!-- 装饰性背景元素 -->
  <circle cx="80" cy="120" r="40" fill="#1A5276" opacity="0.04"/>
  <circle cx="720" cy="880" r="60" fill="#E74C3C" opacity="0.04"/>
  <circle cx="40" cy="980" r="25" fill="#8E44AD" opacity="0.04"/>
  <circle cx="760" cy="140" r="20" fill="#F39C12" opacity="0.04"/>

  <!-- 1. 标题区域 -->
  <rect x="0" y="0" width="800" height="90" fill="url(#headerGrad)"/>
  <text x="400" y="52" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">视频数量对比：YouTube vs TikTok vs Kuaishou</text>
  <text x="400" y="76" text-anchor="middle" fill="#BDC3C7" font-size="14" font-family="system-ui, -apple-system, sans-serif">数据对比信息图</text>
  
  <!-- 标题装饰：播放按钮图标 -->
  <polygon points="730,35 745,45 730,55" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="730" cy="45" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>

  <!-- 数据说明 -->
  <text x="400" y="115" text-anchor="middle" fill="#7F8C8D" font-size="13" font-family="system-ui, -apple-system, sans-serif">数据基于相对倍数（基准 = Kuaishou 1x）</text>

  <!-- 2. 图表区域背景 -->
  <rect x="50" y="130" width="700" height="740" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>

  <!-- 3. 坐标轴 -->
  <!-- Y轴 -->
  <line x1="100" y1="160" x2="100" y2="850" stroke="#BDC3C7" stroke-width="2"/>
  <!-- X轴 -->
  <line x1="100" y1="850" x2="720" y2="850" stroke="#BDC3C7" stroke-width="2"/>

  <!-- Y轴刻度 -->
  <!-- 0 -->
  <line x1="90" y1="850" x2="110" y2="850" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="854" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">0</text>
  <!-- 5 -->
  <line x1="90" y1="710" x2="110" y2="710" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="714" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">5</text>
  <!-- 10 -->
  <line x1="90" y1="570" x2="110" y2="570" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="574" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">10</text>
  <!-- 15 -->
  <line x1="90" y1="430" x2="110" y2="430" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="434" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">15</text>
  <!-- 20 -->
  <line x1="90" y1="290" x2="110" y2="290" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="294" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">20</text>
  <!-- 25 -->
  <line x1="90" y1="150" x2="110" y2="150" stroke="#BDC3C7" stroke-width="2"/>
  <text x="85" y="154" text-anchor="end" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">25</text>

  <!-- 4. 柱状图 -->
  <!-- YouTube（红色）：20 -->
  <rect x="150" y="290" width="120" height="560" rx="4" fill="#E74C3C"/>
  <!-- TikTok（紫色）：2 -->
  <rect x="330" y="794" width="120" height="56" rx="4" fill="#8E44AD"/>
  <!-- Kuaishou（橙色）：1 -->
  <rect x="510" y="822" width="120" height="28" rx="4" fill="#F39C12"/>

  <!-- 5. 数据标签 -->
  <!-- YouTube -->
  <text x="210" y="278" text-anchor="middle" fill="#C0392B" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">20</text>
  <!-- TikTok -->
  <text x="390" y="782" text-anchor="middle" fill="#6C3483" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">2</text>
  <!-- Kuaishou（带背景矩形） -->
  <rect x="550" y="808" width="40" height="24" rx="4" fill="#FFF3E0"/>
  <text x="570" y="826" text-anchor="middle" fill="#D35400" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">1</text>

  <!-- 6. 连线标签（倍数关系） -->
  <!-- 箭头 1：YouTube -> TikTok（10x） -->
  <line x1="270" y1="540" x2="325" y2="540" stroke="#95A5A6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <rect x="280" y="520" width="40" height="20" rx="4" fill="#F4F6F9"/>
  <text x="300" y="535" text-anchor="middle" fill="#8E44AD" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">10x</text>

  <!-- 箭头 2：TikTok -> Kuaishou（2x） -->
  <line x1="450" y1="808" x2="505" y2="808" stroke="#95A5A6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <rect x="460" y="798" width="34" height="20" rx="4" fill="#F4F6F9"/>
  <text x="477" y="813" text-anchor="middle" fill="#F39C12" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">2x</text>

  <!-- 7. X轴平台标签 -->
  <text x="210" y="878" text-anchor="middle" fill="#2C3E50" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">YouTube</text>
  <text x="390" y="878" text-anchor="middle" fill="#2C3E50" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">TikTok</text>
  <text x="570" y="878" text-anchor="middle" fill="#2C3E50" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">Kuaishou</text>

  <!-- 8. 图例 -->
  <g transform="translate(0, 900)">
    <!-- YouTube -->
    <rect x="230" y="10" width="16" height="16" rx="3" fill="#E74C3C"/>
    <text x="252" y="22" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">YouTube</text>
    <!-- TikTok -->
    <rect x="350" y="10" width="16" height="16" rx="3" fill="#8E44AD"/>
    <text x="372" y="22" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">TikTok</text>
    <!-- Kuaishou -->
    <rect x="470" y="10" width="16" height="16" rx="3" fill="#F39C12"/>
    <text x="492" y="22" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, sans-serif">Kuaishou</text>
  </g>

  <!-- 9. 趣味知识卡片 -->
  <rect x="80" y="940" width="640" height="60" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E8E8E8" stroke-width="1"/>
  <text x="100" y="962" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">📌 趣味小知识：YouTube 每分钟上传超过500小时视频，</text>
  <text x="112" y="982" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">TikTok 紧随其后，快手则专注于下沉市场。</text>

  <!-- 10. 点睛语 -->
  <text x="400" y="1035" text-anchor="middle" fill="#7F8C8D" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">💡 数据的河流汇聚成海，每一帧都是时代的缩影。</text>

</svg>