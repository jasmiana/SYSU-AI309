<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="800" height="1050">
  <defs>
    <!-- 标题渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#A29BFE"/>
    </linearGradient>
    
    <!-- 卡片阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6C5CE7"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="1050" fill="#F8FAFC"/>

  <!-- 标题区域 -->
  <g id="header">
    <rect x="0" y="0" width="800" height="140" fill="url(#headerGrad)"/>
    <text x="400" y="70" text-anchor="middle" font-size="36" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">视频数量对比</text>
    <text x="400" y="110" text-anchor="middle" font-size="20" fill="#E2E2E2" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">YouTube vs TikTok vs 快手</text>
  </g>

  <!-- 连接 1：YouTube 到 TikTok (10X) -->
  <g id="connector-10x">
    <line x1="400" y1="520" x2="400" y2="550" stroke="#6C5CE7" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <rect x="415" y="525" width="55" height="26" rx="6" fill="#FF4D4D" opacity="0.95" filter="url(#badgeShadow)"/>
    <text x="442" y="543" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">10X</text>
  </g>

  <!-- 连接 2：TikTok 到快手 (2X) -->
  <g id="connector-2x">
    <line x1="400" y1="667" x2="400" y2="735" stroke="#6C5CE7" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <rect x="330" y="695" width="45" height="26" rx="6" fill="#F39C12" opacity="0.95" filter="url(#badgeShadow)"/>
    <text x="352" y="712" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2X</text>
  </g>

  <!-- YouTube 圆圈 (最大, r=180) -->
  <g id="platform-youtube">
    <circle cx="400" cy="340" r="180" fill="#FF4D4D" filter="url(#shadow)"/>
    <circle cx="400" cy="340" r="160" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.2"/>
    <circle cx="400" cy="340" r="140" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6 6" opacity="0.15"/>
    <text x="400" y="320" text-anchor="middle" font-size="24" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">YouTube</text>
    <text x="400" y="350" text-anchor="middle" font-size="14" fill="#FFFFFF" opacity="0.9" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">全球最大视频平台</text>
    <text x="400" y="380" text-anchor="middle" font-size="13" fill="#FFFFFF" opacity="0.8" font-family="system-ui">(视频总量遥遥领先)</text>
  </g>

  <!-- TikTok 圆圈 (中等, r=57) -->
  <g id="platform-tiktok">
    <circle cx="400" cy="610" r="57" fill="#2D3436" filter="url(#shadow)"/>
    <circle cx="400" cy="610" r="45" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6 5" opacity="0.25"/>
    <text x="400" y="600" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">TikTok</text>
    <text x="400" y="622" text-anchor="middle" font-size="11" fill="#CCCCCC" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">迅猛发展的翘楚</text>
  </g>

  <!-- 快手圆圈 (最小, r=40) -->
  <g id="platform-kuaishou">
    <circle cx="400" cy="780" r="40" fill="#F39C12" filter="url(#shadow)"/>
    <circle cx="400" cy="780" r="30" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
    <text x="400" y="775" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">快手</text>
    <text x="400" y="795" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.9" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">中国领先短视频社区</text>
  </g>

  <!-- 底部洞察卡片 -->
  <g id="insight-card">
    <rect x="100" y="880" width="600" height="80" rx="12" fill="#FFFFFF" filter="url(#softShadow)"/>
    <text x="400" y="910" text-anchor="middle" font-size="14" fill="#2D3436" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
      📊 数据洞察：YouTube 视频总量是 TikTok 的 <tspan fill="#FF4D4D" font-weight="bold">10倍</tspan>，是快手的 <tspan fill="#F39C12" font-weight="bold">20倍</tspan>
    </text>
    <text x="400" y="938" text-anchor="middle" font-size="12" fill="#888888" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
      * 本图采用相对规模示意，圆圈面积代表视频数量 (Kuaishou=1, TikTok=2, YouTube=20)
    </text>
  </g>
</svg>