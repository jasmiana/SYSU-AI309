<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <!-- Arrow marker for connections -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#95A5A6" />
    </marker>

    <!-- Shadow filter for labels -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1" />
    </filter>

    <!-- Gradient for header -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8F9FA" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#FFFFFF" />

  <!-- Header Section -->
  <g id="header">
    <rect x="0" y="0" width="800" height="120" fill="url(#headerGrad)" />
    <rect x="0" y="115" width="800" height="5" fill="#E0E0E0" />
    <text x="400" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#2C3E50">
      Video Count Comparison: YouTube vs TikTok vs Kuaishou
    </text>
  </g>

  <!-- Chart Section -->
  <g id="chart">
    <!-- Grid Reference Lines -->
    <line x1="250" y1="280" x2="250" y2="820" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="750" y1="280" x2="750" y2="820" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Relationship Arrow: YouTube to TikTok -->
    <g id="rel-yt-tk">
      <line x1="395" y1="400" x2="395" y2="535" stroke="#95A5A6" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)" />
      <!-- Label Background & Text -->
      <rect x="395" y="445" width="125" height="28" rx="6" fill="#FFFFFF" filter="url(#shadow)" />
      <text x="457.5" y="464" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">
        10 times more
      </text>
    </g>

    <!-- Relationship Arrow: TikTok to Kuaishou -->
    <g id="rel-tk-ks">
      <line x1="270" y1="600" x2="270" y2="735" stroke="#95A5A6" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)" />
      <!-- Label Background & Text -->
      <rect x="270" y="645" width="105" height="28" rx="6" fill="#FFFFFF" filter="url(#shadow)" />
      <text x="322.5" y="664" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">
        2 times more
      </text>
    </g>

    <!-- Bars -->
    <!-- YouTube Bar -->
    <rect x="250" y="340" width="530" height="60" rx="6" fill="#E74C3C" />
    <!-- TikTok Bar -->
    <rect x="250" y="540" width="53" height="60" rx="6" fill="#4A90D9" />
    <!-- Kuaishou Bar -->
    <rect x="250" y="740" width="26.5" height="60" rx="6" fill="#27AE60" />

    <!-- Labels and Values -->
    <!-- YouTube -->
    <text x="230" y="380" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#E74C3C">
      YouTube
    </text>
    <text x="770" y="380" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">
      20x
    </text>

    <!-- TikTok -->
    <text x="230" y="580" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#4A90D9">
      TikTok
    </text>
    <text x="310" y="580" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#4A90D9">
      2x
    </text>

    <!-- Kuaishou -->
    <text x="230" y="780" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#27AE60">
      Kuaishou
    </text>
    <text x="283" y="780" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#27AE60">
      1x
    </text>
  </g>

  <!-- Footer Section -->
  <g id="footer">
    <!-- X-Axis Label -->
    <text x="515" y="870" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="medium" fill="#7F8C8D">
      Relative Video Count (x times scale)
    </text>
    
    <!-- Divider -->
    <rect x="50" y="920" width="700" height="1" fill="#E0E0E0" />

    <!-- Footnote -->
    <text x="400" y="960" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#95A5A6">
      Comparison of major video sharing platforms based on publicly available data and calculated relative ratios.
    </text>
    
    <!-- Decorative brand indicator dots -->
    <circle cx="330" cy="990" r="4" fill="#E74C3C" />
    <text x="340" y="994" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#95A5A6">YouTube</text>
    
    <circle cx="420" cy="990" r="4" fill="#4A90D9" />
    <text x="430" y="994" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#95A5A6">TikTok</text>
    
    <circle cx="510" cy="990" r="4" fill="#27AE60" />
    <text x="520" y="994" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#95A5A6">Kuaishou</text>
  </g>
</svg>