<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <linearGradient id="gradYoutube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9" />
      <stop offset="100%" stop-color="#357ABD" />
    </linearGradient>
    <linearGradient id="gradTikTok" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B68EE" />
      <stop offset="100%" stop-color="#6A5ACD" />
    </linearGradient>
    <linearGradient id="gradKuaishou" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#27AE60" />
      <stop offset="100%" stop-color="#1E8449" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B" />
    </marker>
    <style>
      .title { font-family: 'Microsoft YaHei', system-ui, -apple-system, sans-serif; }
      .axis-label { font-family: system-ui, -apple-system, sans-serif; }
      .data-label { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>
  
  <rect width="800" height="900" fill="#FFFFFF" />

  <!-- 标题区域 -->
  <g id="title">
    <rect x="40" y="20" width="720" height="60" rx="8" fill="url(#gradYoutube)" filter="url(#shadow)" />
    <text x="400" y="56" class="title" fill="#FFFFFF" font-size="28" font-weight="bold" text-anchor="middle" dominant-baseline="middle">短视频平台视频数量对比</text>
  </g>

  <!-- 图表区域 -->
  <g id="chart-area">
    <!-- Y轴标题 -->
    <text x="25" y="410" class="title" fill="#666666" font-size="14" text-anchor="middle" transform="rotate(-90 25 410)">相对视频数量（倍数）</text>

    <!-- 背景网格线 -->
    <line x1="100" y1="120" x2="700" y2="120" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="100" y1="240" x2="700" y2="240" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="100" y1="360" x2="700" y2="360" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="100" y1="480" x2="700" y2="480" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="100" y1="600" x2="700" y2="600" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4" />

    <!-- Y轴和X轴 -->
    <line x1="100" y1="100" x2="100" y2="720" stroke="#333333" stroke-width="2" />
    <line x1="100" y1="720" x2="700" y2="720" stroke="#333333" stroke-width="2" />

    <!-- Y轴刻度 -->
    <text x="90" y="724" class="axis-label" fill="#333333" font-size="14" text-anchor="end">0</text>
    <text x="90" y="604" class="axis-label" fill="#333333" font-size="14" text-anchor="end">5</text>
    <text x="90" y="484" class="axis-label" fill="#333333" font-size="14" text-anchor="end">10</text>
    <text x="90" y="364" class="axis-label" fill="#333333" font-size="14" text-anchor="end">15</text>
    <text x="90" y="244" class="axis-label" fill="#333333" font-size="14" text-anchor="end">20</text>
    <text x="90" y="124" class="axis-label" fill="#333333" font-size="14" text-anchor="end">25</text>

    <!-- X轴平台标签 -->
    <text x="240" y="745" class="title" fill="#333333" font-size="16" font-weight="bold" text-anchor="middle">YouTube</text>
    <text x="400" y="745" class="title" fill="#333333" font-size="16" font-weight="bold" text-anchor="middle">TikTok</text>
    <text x="560" y="745" class="title" fill="#333333" font-size="16" font-weight="bold" text-anchor="middle">快手（Kuaishou）</text>

    <!-- 数据柱体 -->
    <rect x="180" y="240" width="120" height="480" rx="4" fill="url(#gradYoutube)" filter="url(#shadow)" />
    <rect x="340" y="672" width="120" height="48" rx="4" fill="url(#gradTikTok)" filter="url(#shadow)" />
    <rect x="500" y="696" width="120" height="24" rx="4" fill="url(#gradKuaishou)" filter="url(#shadow)" />

    <!-- 柱顶数据标签 -->
    <text x="240" y="225" class="data-label" fill="#333333" font-size="20" font-weight="bold" text-anchor="middle">20x</text>
    <text x="400" y="660" class="data-label" fill="#333333" font-size="20" font-weight="bold" text-anchor="middle">2x</text>
    <text x="560" y="684" class="data-label" fill="#333333" font-size="20" font-weight="bold" text-anchor="middle">1x</text>

    <!-- 倍数关系指示 -->
    <!-- YouTube 和 TikTok 之间 -->
    <line x1="305" y1="320" x2="335" y2="320" stroke="#FF6B6B" stroke-width="3" marker-end="url(#arrowRed)" />
    <text x="320" y="310" class="title" fill="#FF6B6B" font-size="14" font-weight="bold" text-anchor="middle">10倍</text>

    <!-- TikTok 和 快手 之间 -->
    <line x1="465" y1="680" x2="495" y2="680" stroke="#FF6B6B" stroke-width="3" marker-end="url(#arrowRed)" />
    <text x="480" y="670" class="title" fill="#FF6B6B" font-size="14" font-weight="bold" text-anchor="middle">2倍</text>

    <!-- 图表说明 -->
    <text x="400" y="790" class="title" fill="#666666" font-size="14" text-anchor="middle">YouTube视频数量是TikTok的10倍，TikTok是Kuaishou的2倍</text>
  </g>

  <!-- 页脚区域 -->
  <g id="footer">
    <line x1="250" y1="845" x2="550" y2="845" stroke="#E0E0E0" stroke-width="1" />
    <text x="400" y="870" class="title" fill="#999999" font-size="12" text-anchor="middle">数据基于公开估算，实际数值可能有所浮动</text>
  </g>
</svg>