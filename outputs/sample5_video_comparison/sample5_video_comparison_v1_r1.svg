<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
    <defs>
        <linearGradient id="gradYouTube" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4A90D9"/>
            <stop offset="100%" stop-color="#357ABD"/>
        </linearGradient>
        <linearGradient id="gradTikTok" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7B68EE"/>
            <stop offset="100%" stop-color="#5A53D1"/>
        </linearGradient>
        <linearGradient id="gradKuaishou" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#27AE60"/>
            <stop offset="100%" stop-color="#1F8B4C"/>
        </linearGradient>
        
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4A90D9" flood-opacity="0.06"/>
        </filter>

        <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto-start-reverse">
            <path d="M 10 0 L 0 5 L 10 10 z" fill="#95A5A6" />
        </marker>
        <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#95A5A6" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="800" height="1000" fill="#F8FAFD" />

    <!-- Main Card -->
    <rect x="30" y="30" width="740" height="940" rx="16" fill="#FFFFFF" filter="url(#shadow)" />

    <!-- Title Section -->
    <g id="title-section">
        <text x="400" y="80" text-anchor="middle" font-family="'Microsoft YaHei', -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#1D3557" dominant-baseline="central">
            YouTube、TikTok与快手视频数量对比
        </text>
        <line x1="360" y1="105" x2="440" y2="105" stroke="#4A90D9" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- Legend Section -->
    <g id="legend-section">
        <circle cx="290" cy="140" r="7" fill="url(#gradKuaishou)" />
        <text x="310" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2C3E50" dominant-baseline="central" font-weight="medium">快手 (1x)</text>
        
        <circle cx="390" cy="140" r="7" fill="url(#gradTikTok)" />
        <text x="410" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2C3E50" dominant-baseline="central" font-weight="medium">TikTok (2x)</text>
        
        <circle cx="490" cy="140" r="7" fill="url(#gradYouTube)" />
        <text x="510" y="140" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#2C3E50" dominant-baseline="central" font-weight="medium">YouTube (20x)</text>
    </g>

    <!-- Chart Section -->
    <g id="chart-section">
        <!-- Baseline -->
        <line x1="130" y1="220" x2="130" y2="620" stroke="#D1D8E0" stroke-width="2" stroke-linecap="round" />

        <!-- Comparison Span Line 1 (2x) -->
        <line x1="165" y1="250" x2="185" y2="250" stroke="#BDC3C7" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
        <text x="175" y="240" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#7F8C8D" font-weight="bold" dominant-baseline="baseline">2倍</text>

        <!-- Bar: Kuaishou -->
        <rect x="130" y="280" width="30" height="40" rx="4" fill="url(#gradKuaishou)" />
        <text x="110" y="300" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#1E272E" font-weight="bold" dominant-baseline="central">快手</text>
        <text x="170" y="300" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#27AE60" font-weight="bold" dominant-baseline="central">1×</text>

        <!-- Comparison Span Line 2 (10x) -->
        <line x1="195" y1="370" x2="725" y2="370" stroke="#BDC3C7" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
        <text x="460" y="360" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#7F8C8D" font-weight="bold" dominant-baseline="baseline">10倍</text>

        <!-- Bar: TikTok -->
        <rect x="130" y="400" width="60" height="40" rx="4" fill="url(#gradTikTok)" />
        <text x="110" y="420" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#1E272E" font-weight="bold" dominant-baseline="central">TikTok</text>
        <text x="200" y="420" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#7B68EE" font-weight="bold" dominant-baseline="central">2×</text>

        <!-- Comparison Span Line 3 (20x Inferred) -->
        <line x1="165" y1="505" x2="725" y2="505" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="6,4" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)" />
        <text x="445" y="495" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#7F8C8D" font-weight="bold" dominant-baseline="baseline">20倍 (推断)</text>

        <!-- Bar: YouTube -->
        <rect x="130" y="530" width="600" height="60" rx="8" fill="url(#gradYouTube)" />
        <text x="110" y="560" text-anchor="end" font-family="'Microsoft YaHei', sans-serif" font-size="20" fill="#1E272E" font-weight="bold" dominant-baseline="central">YouTube</text>
        <text x="710" y="560" text-anchor="end" font-family="'system-ui', -apple-system, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold" dominant-baseline="central">20×</text>
    </g>

    <!-- Footer Section -->
    <g id="footer-section">
        <text x="400" y="880" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#A0AAB5" dominant-baseline="central">
            * 以快手视频数量为基准（1x），数据基于用户提供倍数关系推算
        </text>
    </g>
</svg>