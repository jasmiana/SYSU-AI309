<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <!-- 阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="barShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    
    <!-- 标题渐变 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    
    <!-- 箭头 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 700; fill: #FFFFFF; }
    .subtitle { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-weight: 500; fill: #E8F0FE; }
    .axis-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 13px; fill: #666666; }
    .bar-label { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-weight: 600; text-anchor: middle; }
    .platform-name { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 600; font-size: 16px; fill: #333333; text-anchor: middle; }
    .insight-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 700; font-size: 20px; fill: #1A1A2E; }
    .insight-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 400; font-size: 15px; fill: #4A4A4A; }
    .footer-text { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-weight: 400; font-size: 13px; fill: #999999; text-anchor: middle; }
    .icon-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 16px; text-anchor: middle; dominant-baseline: central; }
  </style>

  <!-- 背景 -->
  <rect width="800" height="1000" fill="#F8F9FF"/>

  <!-- 标题区域 -->
  <rect x="40" y="30" width="720" height="80" rx="40" fill="url(#titleGrad)" filter="url(#cardShadow)"/>
  <text x="400" y="62" text-anchor="middle" font-size="28" class="title">YouTube vs TikTok vs Kuaishou: Video Count Comparison</text>
  <text x="400" y="92" text-anchor="middle" font-size="14" class="subtitle">Content Volume Disparity in the Short-Video Ecosystem</text>

  <!-- 图表区域 -->
  <!-- Y 轴 -->
  <line x1="120" y1="180" x2="120" y2="600" stroke="#333333" stroke-width="2"/>
  <!-- X 轴 -->
  <line x1="120" y1="600" x2="750" y2="600" stroke="#333333" stroke-width="2"/>

  <!-- Y 轴标签 -->
  <text x="90" y="390" text-anchor="middle" transform="rotate(-90 90,390)" class="axis-text">Relative Video Count (Scale)</text>

  <!-- 网格线 -->
  <line x1="120" y1="495" x2="750" y2="495" stroke="#E0E4F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="390" x2="750" y2="390" stroke="#E0E4F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="285" x2="750" y2="285" stroke="#E0E4F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="180" x2="750" y2="180" stroke="#E0E4F0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 网格刻度 -->
  <text x="105" y="500" text-anchor="end" class="axis-text">25%</text>
  <text x="105" y="395" text-anchor="end" class="axis-text">50%</text>
  <text x="105" y="290" text-anchor="end" class="axis-text">75%</text>
  <text x="105" y="185" text-anchor="end" class="axis-text">100%</text>

  <!-- 曲线连接线（在条形图之前放置以在底部） -->
  <!-- Kuaishou 到 TikTok (2x more) -->
  <path d="M 295 560 Q 365 540 425 520" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <!-- TikTok 到 YouTube (10x more) -->
  <path d="M 445 520 Q 515 360 575 200" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>

  <!-- 倍数标签 -->
  <text x="360" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#FF6B6B">2× more</text>
  <text x="515" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#FF6B6B">10× more</text>

  <!-- 条形图 -->
  <!-- Kuaishou: h=40, y=560 -->
  <rect x="240" y="560" width="90" height="40" rx="6" fill="#27AE60" filter="url(#barShadow)"/>
  <!-- TikTok: h=80, y=520 -->
  <rect x="390" y="520" width="90" height="80" rx="6" fill="#7B68EE" filter="url(#barShadow)"/>
  <!-- YouTube: h=400, y=200 -->
  <rect x="540" y="200" width="90" height="400" rx="6" fill="#4A90D9" filter="url(#barShadow)"/>

  <!-- 平台名称 -->
  <text x="285" y="625" class="platform-name">Kuaishou</text>
  <text x="435" y="625" class="platform-name">TikTok</text>
  <text x="585" y="625" class="platform-name">YouTube</text>

  <!-- 平台字母图标 -->
  <!-- Kuaishou -->
  <circle cx="285" cy="525" r="22" fill="#27AE60" stroke="#FFFFFF" stroke-width="3"/>
  <text x="285" y="525" class="icon-text">K</text>
  
  <!-- TikTok -->
  <circle cx="435" cy="485" r="22" fill="#7B68EE" stroke="#FFFFFF" stroke-width="3"/>
  <text x="435" y="485" class="icon-text">T</text>
  
  <!-- YouTube -->
  <circle cx="585" cy="165" r="22" fill="#4A90D9" stroke="#FFFFFF" stroke-width="3"/>
  <text x="585" y="165" class="icon-text">Y</text>

  <!-- 见解区域 -->
  <rect x="60" y="690" width="680" height="220" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
  
  <text x="80" y="730" class="insight-title">Insights &amp; Analysis</text>
  
  <circle cx="85" cy="755" r="4" fill="#FF6B6B"/>
  <text x="100" y="760" class="insight-text">YouTube leads with 10× the video library of TikTok, demonstrating overwhelming content dominance.</text>
  
  <circle cx="85" cy="790" r="4" fill="#FF6B6B"/>
  <text x="100" y="795" class="insight-text">TikTok still holds 2× the content volume of Kuaishou, highlighting a significant mid-pack gap.</text>
  
  <circle cx="85" cy="825" r="4" fill="#FF6B6B"/>
  <text x="100" y="830" class="insight-text">The supply gap underscores YouTube's long-tail content advantage in the evolving video landscape.</text>

  <circle cx="85" cy="860" r="4" fill="#FF6B6B"/>
  <text x="100" y="865" class="insight-text">Content supply imbalance persists across the short-video market, with YouTube retaining the upper hand.</text>

  <!-- 页脚 -->
  <rect x="250" y="945" width="300" height="30" rx="15" fill="#F0F2F5"/>
  <text x="400" y="964" class="footer-text">Source: Public estimates &amp; market data, 2025</text>
</svg>