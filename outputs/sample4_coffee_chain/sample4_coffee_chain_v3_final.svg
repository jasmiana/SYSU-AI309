<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1350" width="800" height="1350">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6F4E37" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#D4A574"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6F4E37"/>
      <stop offset="100%" stop-color="#8B6349"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="1350" fill="#FFF8F0" />

  <!-- 标题区域 -->
  <rect x="0" y="0" width="800" height="160" fill="url(#headerGrad)" />
  <text x="400" y="75" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">从咖啡豆到咖啡的完整生产链</text>
  <text x="400" y="125" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="normal" fill="#F5E6D3" text-anchor="middle" dominant-baseline="middle">探索咖啡从种子到杯子的奇妙旅程</text>

  <!-- 步骤 1：种植 -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="680" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E8D5C4" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="100" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
    <text x="70" y="70" font-family="sans-serif" font-size="48" text-anchor="middle" dominant-baseline="central">🌱</text>
    <text x="140" y="45" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#6F4E37">种植阶段</text>
    <text x="140" y="85" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">在适宜气候和海拔下种植，需要精心管理。</text>
  </g>

  <!-- 箭头 1 -->
  <line x1="400" y1="365" x2="400" y2="395" stroke="#D4A574" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="360" y="370" width="80" height="24" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
  <text x="400" y="382" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#6F4E37" text-anchor="middle" dominant-baseline="central">咖啡果</text>

  <!-- 步骤 2：采摘 -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="680" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E8D5C4" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="100" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
    <text x="70" y="70" font-family="sans-serif" font-size="48" text-anchor="middle" dominant-baseline="central">🍒</text>
    <text x="140" y="45" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#6F4E37">采摘阶段</text>
    <text x="140" y="85" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">成熟的咖啡果经手工或机械采摘后，去除果肉得到生豆。</text>
  </g>

  <!-- 箭头 2 -->
  <line x1="400" y1="555" x2="400" y2="585" stroke="#D4A574" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="360" y="560" width="80" height="24" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
  <text x="400" y="572" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#6F4E37" text-anchor="middle" dominant-baseline="central">生豆</text>

  <!-- 步骤 3：烘焙 -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="680" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E8D5C4" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="100" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
    <text x="70" y="70" font-family="sans-serif" font-size="48" text-anchor="middle" dominant-baseline="central">🔥</text>
    <text x="140" y="45" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#6F4E37">烘焙阶段</text>
    <text x="140" y="85" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">生豆通过加热烘焙，产生化学反应，颜色加深成熟豆。</text>
  </g>

  <!-- 箭头 3 -->
  <line x1="400" y1="745" x2="400" y2="775" stroke="#D4A574" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="360" y="750" width="80" height="24" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
  <text x="400" y="762" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#6F4E37" text-anchor="middle" dominant-baseline="central">熟豆</text>

  <!-- 步骤 4：研磨 -->
  <g transform="translate(60, 790)">
    <rect x="0" y="0" width="680" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E8D5C4" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="100" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
    <text x="70" y="70" font-family="sans-serif" font-size="48" text-anchor="middle" dominant-baseline="central">⚙️</text>
    <text x="140" y="45" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#6F4E37">研磨阶段</text>
    <text x="140" y="85" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">熟豆被研磨成不同粗细的咖啡粉，影响萃取效果。</text>
  </g>

  <!-- 箭头 4 -->
  <line x1="400" y1="935" x2="400" y2="965" stroke="#D4A574" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="360" y="940" width="80" height="24" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
  <text x="400" y="952" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="12" fill="#6F4E37" text-anchor="middle" dominant-baseline="central">咖啡粉</text>

  <!-- 步骤 5：冲煮 -->
  <g transform="translate(60, 980)">
    <rect x="0" y="0" width="680" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E8D5C4" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="100" rx="12" fill="#FFF8F0" stroke="#D4A574" stroke-width="1"/>
    <text x="70" y="70" font-family="sans-serif" font-size="48" text-anchor="middle" dominant-baseline="central">☕️</text>
    <text x="140" y="45" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#6F4E37">冲煮阶段</text>
    <text x="140" y="85" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">咖啡粉与热水接触，通过过滤或浸泡方式萃取，形成一杯咖啡。</text>
  </g>

  <!-- 页脚区域 -->
  <rect x="0" y="1150" width="800" height="200" fill="#F5E6D3" />
  <text x="400" y="1250" font-family="system-ui, 'Microsoft YaHei', sans-serif" font-size="14" fill="#6F4E37" text-anchor="middle" dominant-baseline="middle">数据来源：咖啡行业协会 | 设计制作：可视化布局规划器</text>
</svg>