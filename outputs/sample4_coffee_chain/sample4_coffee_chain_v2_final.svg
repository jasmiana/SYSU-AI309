<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F0E0C8"/>
    </linearGradient>
    
    <!-- 标题横幅渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>

    <!-- 节点阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8B5A2B" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8B5A2B" flood-opacity="0.1"/>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A0522D"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 36px; font-weight: bold; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #FFFFFF; text-anchor: middle; }
    .subtitle { font-size: 16px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #F0E0D0; text-anchor: middle; }
    .node-title { font-size: 18px; font-weight: bold; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #FFFFFF; text-anchor: middle; }
    .node-desc { font-size: 13px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #F0E0D0; text-anchor: middle; }
    .step-num { font-size: 16px; font-weight: bold; font-family: 'Arial', sans-serif; fill: #8B5A2B; text-anchor: middle; dominant-baseline: central; }
    .footer-text { font-size: 14px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #D2B48C; text-anchor: middle; }
  </style>

  <!-- 背景 -->
  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- 标题区域 -->
  <g id="title-section">
    <rect x="0" y="0" width="800" height="100" fill="url(#headerGrad)"/>
    <text x="400" y="55" class="title">从咖啡豆到一杯咖啡的生产链</text>
    <text x="400" y="85" class="subtitle">了解一颗咖啡豆的奇妙旅程</text>
  </g>

  <!-- 流程区域 -->
  <g id="process-section">
    <!-- 起点：咖啡豆 -->
    <g id="start-node">
      <rect x="220" y="160" width="360" height="70" rx="35" fill="#A0522D" filter="url(#shadowLight)"/>
      <g transform="translate(260, 195)">
        <ellipse cx="0" cy="0" rx="7" ry="10" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
        <path d="M-3,-10 Q5,0 -3,10" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
      </g>
      <text x="400" y="202" class="node-title">咖啡豆</text>
    </g>

    <!-- 箭头 1 -->
    <line x1="400" y1="230" x2="400" y2="273" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 步骤 1：种植 -->
    <g id="step-1">
      <rect x="220" y="285" width="360" height="70" rx="12" fill="#8B5A2B" filter="url(#shadow)"/>
      <g transform="translate(260, 320)">
        <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#A0522D" opacity="0.9"/>
        <path d="M0,-10 Q-5,0 0,10 Q5,0 0,-10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      </g>
      <text x="400" y="327" class="node-title">种植</text>
      <text x="400" y="347" class="node-desc">等待咖啡果成熟</text>
      <!-- 步骤编号 1 -->
      <g transform="translate(190, 260)">
        <circle cx="0" cy="0" r="16" fill="#FFF8F0" stroke="#8B5A2B" stroke-width="3"/>
        <text x="0" y="0" class="step-num">1</text>
      </g>
    </g>

    <!-- 箭头 2 -->
    <line x1="400" y1="355" x2="400" y2="398" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 步骤 2：采摘 -->
    <g id="step-2">
      <rect x="220" y="410" width="360" height="70" rx="12" fill="#8B5A2B" filter="url(#shadow)"/>
      <g transform="translate(260, 445)">
        <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#A0522D" opacity="0.9"/>
        <path d="M-8,-5 L8,-5 L5,7 L-5,7 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#FFFFFF" stroke-width="2"/>
        <path d="M-5,7 Q0,12 5,7" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      </g>
      <text x="400" y="452" class="node-title">采摘</text>
      <text x="400" y="472" class="node-desc">手工或机械采摘</text>
      <g transform="translate(190, 385)">
        <circle cx="0" cy="0" r="16" fill="#FFF8F0" stroke="#8B5A2B" stroke-width="3"/>
        <text x="0" y="0" class="step-num">2</text>
      </g>
    </g>

    <!-- 箭头 3 -->
    <line x1="400" y1="480" x2="400" y2="523" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 步骤 3：烘焙 -->
    <g id="step-3">
      <rect x="220" y="535" width="360" height="70" rx="12" fill="#8B5A2B" filter="url(#shadow)"/>
      <g transform="translate(260, 570)">
        <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#A0522D" opacity="0.9"/>
        <path d="M0,-10 Q4,-2 0,5 Q-4,-2 0,-10" fill="#FFFFFF"/>
      </g>
      <text x="400" y="577" class="node-title">烘焙</text>
      <text x="400" y="597" class="node-desc">发展独特风味香气</text>
      <g transform="translate(190, 510)">
        <circle cx="0" cy="0" r="16" fill="#FFF8F0" stroke="#8B5A2B" stroke-width="3"/>
        <text x="0" y="0" class="step-num">3</text>
      </g>
    </g>

    <!-- 箭头 4 -->
    <line x1="400" y1="605" x2="400" y2="648" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 步骤 4：研磨 -->
    <g id="step-4">
      <rect x="220" y="660" width="360" height="70" rx="12" fill="#8B5A2B" filter="url(#shadow)"/>
      <g transform="translate(260, 695)">
        <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#A0522D" opacity="0.9"/>
        <circle cx="0" cy="0" r="5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <rect x="-1.5" y="-9" width="3" height="18" fill="#FFFFFF"/>
        <rect x="-9" y="-1.5" width="18" height="3" fill="#FFFFFF"/>
      </g>
      <text x="400" y="702" class="node-title">研磨</text>
      <text x="400" y="722" class="node-desc">磨成均匀粉末颗粒</text>
      <g transform="translate(190, 635)">
        <circle cx="0" cy="0" r="16" fill="#FFF8F0" stroke="#8B5A2B" stroke-width="3"/>
        <text x="0" y="0" class="step-num">4</text>
      </g>
    </g>

    <!-- 箭头 5 -->
    <line x1="400" y1="730" x2="400" y2="773" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 步骤 5：冲煮 -->
    <g id="step-5">
      <rect x="220" y="785" width="360" height="70" rx="12" fill="#8B5A2B" filter="url(#shadow)"/>
      <g transform="translate(260, 820)">
        <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#A0522D" opacity="0.9"/>
        <path d="M-7,-5 L7,-5 L5,7 L-5,7 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <path d="M7,-3 C12,-3 12,5 7,5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      </g>
      <text x="400" y="827" class="node-title">冲煮</text>
      <text x="400" y="847" class="node-desc">热水萃取最终饮品</text>
      <g transform="translate(190, 760)">
        <circle cx="0" cy="0" r="16" fill="#FFF8F0" stroke="#8B5A2B" stroke-width="3"/>
        <text x="0" y="0" class="step-num">5</text>
      </g>
    </g>

    <!-- 箭头 6 -->
    <line x1="400" y1="855" x2="400" y2="898" stroke="#A0522D" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- 终点：一杯咖啡 -->
    <g id="end-node">
      <rect x="220" y="910" width="360" height="70" rx="35" fill="#A0522D" filter="url(#shadowLight)"/>
      <g transform="translate(260, 945)">
        <path d="M-8,-5 L8,-5 L5,7 L-5,7 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
        <path d="M-5,-8 Q0,-13 5,-8" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
        <path d="M-2,-10 Q0,-15 2,-10" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
      </g>
      <text x="400" y="952" class="node-title">一杯咖啡</text>
    </g>
  </g>

  <!-- 页脚区域 -->
  <g id="footer-section">
    <rect x="0" y="1140" width="800" height="60" fill="#A0522D"/>
    <text x="400" y="1175" class="footer-text">从种植到杯中，每一步都凝聚匠心</text>
  </g>

</svg>