<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1300" width="100%" height="100%">
  <defs>
    <!-- 标题渐变色 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    
    <!-- 卡片阴影效果 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    
    <!-- 箭头定义 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498DB"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="1300" fill="#FAFFFE" />

  <!-- 顶部标题区域（全宽） -->
  <g id="title-section">
    <rect x="40" y="26" width="720" height="104" rx="12" fill="url(#headerGrad)" />
    <text x="400" y="86" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="bold">从咖啡豆到一杯咖啡的生产链</text>
  </g>

  <!-- 起始节点（咖啡豆） -->
  <g id="start-section">
    <!-- 中心装饰点 -->
    <circle cx="400" cy="221" r="6" fill="#3498DB" opacity="0.8"/>
    <!-- 椭圆形主体 -->
    <ellipse cx="400" cy="221" rx="60" ry="35" fill="#27AE60" filter="url(#cardShadow)"/>
    <text x="400" y="228" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">一颗咖啡豆</text>
  </g>

  <!-- 连接箭头 -->
  <g id="arrows">
    <!-- 起始到步骤1 -->
    <line x1="400" y1="256" x2="400" y2="305" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="280" r="4" fill="#3498DB"/>
    
    <!-- 步骤1到步骤2 -->
    <line x1="400" y1="442" x2="400" y2="461" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="451" r="4" fill="#3498DB"/>
    
    <!-- 步骤2到步骤3 -->
    <line x1="400" y1="598" x2="400" y2="617" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="607" r="4" fill="#3498DB"/>
    
    <!-- 步骤3到步骤4 -->
    <line x1="400" y1="754" x2="400" y2="773" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="763" r="4" fill="#3498DB"/>
    
    <!-- 步骤4到步骤5 -->
    <line x1="400" y1="910" x2="400" y2="929" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="919" r="4" fill="#3498DB"/>
    
    <!-- 步骤5到结束 -->
    <line x1="400" y1="1066" x2="400" y2="1085" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <circle cx="400" cy="1075" r="4" fill="#3498DB"/>
  </g>

  <!-- 流程主体卡片 -->
  <g id="steps">
    <!-- 步骤1：种植 -->
    <g id="step1-section">
      <rect x="140" y="312" width="520" height="130" rx="10" fill="#FFFFFF" stroke="#D5F5E3" stroke-width="2" filter="url(#cardShadow)"/>
      <rect x="160" y="332" width="140" height="60" rx="8" fill="#27AE60"/>
      <text x="230" y="367" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">种植</text>
      
      <text x="330" y="345" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold">步骤 1</text>
      <text x="330" y="354" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">选择优质种子，在适宜气候</text>
      <text x="330" y="376" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">和海拔的土壤中播种，</text>
      <text x="330" y="398" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">咖啡树需3-4年才能结果。</text>
    </g>

    <!-- 步骤2：采摘 -->
    <g id="step2-section">
      <rect x="140" y="468" width="520" height="130" rx="10" fill="#FFFFFF" stroke="#D5F5E3" stroke-width="2" filter="url(#cardShadow)"/>
      <rect x="160" y="488" width="140" height="60" rx="8" fill="#27AE60"/>
      <text x="230" y="523" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">采摘</text>
      
      <text x="330" y="501" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold">步骤 2</text>
      <text x="330" y="510" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">当咖啡果实成熟变为红色时，</text>
      <text x="330" y="532" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">通过手工或机器采摘，</text>
      <text x="330" y="554" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">确保只摘取成熟果实以保证品质。</text>
    </g>

    <!-- 步骤3：烘焙 -->
    <g id="step3-section">
      <rect x="140" y="624" width="520" height="130" rx="10" fill="#FFFFFF" stroke="#D5F5E3" stroke-width="2" filter="url(#cardShadow)"/>
      <rect x="160" y="644" width="140" height="60" rx="8" fill="#27AE60"/>
      <text x="230" y="679" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">烘焙</text>
      
      <text x="330" y="657" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold">步骤 3</text>
      <text x="330" y="666" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">将咖啡生豆在高温下烘焙，</text>
      <text x="330" y="688" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">发生美拉德反应和焦糖化，</text>
      <text x="330" y="710" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">发展出独特的风味和香气。</text>
    </g>

    <!-- 步骤4：研磨 -->
    <g id="step4-section">
      <rect x="140" y="780" width="520" height="130" rx="10" fill="#FFFFFF" stroke="#D5F5E3" stroke-width="2" filter="url(#cardShadow)"/>
      <rect x="160" y="800" width="140" height="60" rx="8" fill="#27AE60"/>
      <text x="230" y="835" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">研磨</text>
      
      <text x="330" y="813" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold">步骤 4</text>
      <text x="330" y="822" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">烘焙后的咖啡豆冷却后，</text>
      <text x="330" y="844" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">根据冲煮方式（如手冲、意式浓缩）</text>
      <text x="330" y="866" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">研磨成不同粗细的粉末。</text>
    </g>

    <!-- 步骤5：冲煮 -->
    <g id="step5-section">
      <rect x="140" y="936" width="520" height="130" rx="10" fill="#FFFFFF" stroke="#D5F5E3" stroke-width="2" filter="url(#cardShadow)"/>
      <rect x="160" y="956" width="140" height="60" rx="8" fill="#27AE60"/>
      <text x="230" y="991" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">冲煮</text>
      
      <text x="330" y="969" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold">步骤 5</text>
      <text x="330" y="978" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">使用88-96°C热水以不同方法</text>
      <text x="330" y="1000" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">（滴滤、浸泡、加压）冲泡咖啡粉，</text>
      <text x="330" y="1022" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">提取风味物质，得到一杯香醇咖啡。</text>
    </g>
  </g>

  <!-- 结束节点（一杯咖啡） -->
  <g id="end-section">
    <rect x="300" y="1092" width="200" height="70" rx="35" fill="#27AE60" filter="url(#cardShadow)"/>
    <text x="400" y="1135" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold">☕ 一杯咖啡</text>
  </g>

  <!-- 底部注释区域 -->
  <g id="footer-section">
    <line x1="140" y1="1196" x2="660" y2="1196" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="400" y="1230" text-anchor="middle" fill="#808B96" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14">注：咖啡生产流程根据行业通用实践整理。</text>
  </g>
</svg>