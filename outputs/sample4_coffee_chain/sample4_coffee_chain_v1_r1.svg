<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%">
  <defs>
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E8449"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    
    <!-- 卡片柔和阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.1"/>
    </filter>

    <!-- 步骤节点光泽/高光效果 -->
    <linearGradient id="stepGradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="stepGradOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5B041"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <linearGradient id="stepGradBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#3498DB"/>
    </linearGradient>

    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#27AE60">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="1000" fill="#FAFFFE" />

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="800" height="4" fill="#1E8449" />

  <!-- 标题栏区域 -->
  <g id="header">
    <rect x="0" y="10" width="800" height="80" fill="url(#headerGrad)" />
    <text x="400" y="60" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">从咖啡豆到咖啡的完整生产链流程图</text>
  </g>

  <!-- 连接线（箭头）定义在节点之间 -->
  <!-- 箭头 1（节点 1 到 节点 2） -->
  <line x1="400" y1="260" x2="400" y2="290" stroke="#27AE60" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  
  <!-- 箭头 2（节点 2 到 节点 3） -->
  <line x1="400" y1="420" x2="400" y2="450" stroke="#27AE60" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  
  <!-- 箭头 3（节点 3 到 节点 4） -->
  <line x1="400" y1="580" x2="400" y2="610" stroke="#27AE60" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  
  <!-- 箭头 4（节点 4 到 节点 5） -->
  <line x1="400" y1="740" x2="400" y2="770" stroke="#27AE60" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />

  <!-- 步骤 1：种植 -->
  <g id="step1">
    <rect x="160" y="140" width="480" height="120" rx="12" fill="url(#stepGradGreen)" filter="url(#cardShadow)" />
    <text x="400" y="190" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">种植</text>
    <text x="400" y="225" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" opacity="0.95">咖啡树生长 → 结出咖啡果（内含咖啡豆）</text>
  </g>

  <!-- 步骤 2：采摘 -->
  <g id="step2">
    <rect x="160" y="300" width="480" height="120" rx="12" fill="url(#stepGradGreen)" filter="url(#cardShadow)" />
    <text x="400" y="350" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">采摘</text>
    <text x="400" y="385" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" opacity="0.95">采摘成熟咖啡果 → 取出咖啡豆（生豆）</text>
  </g>

  <!-- 步骤 3：烘焙 -->
  <g id="step3">
    <rect x="160" y="460" width="480" height="120" rx="12" fill="url(#stepGradOrange)" filter="url(#cardShadow)" />
    <text x="400" y="510" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">烘焙</text>
    <text x="400" y="545" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" opacity="0.95">高温烘焙 → 产生香气与风味（颜色变深成为熟豆）</text>
  </g>

  <!-- 步骤 4：研磨 -->
  <g id="step4">
    <rect x="160" y="620" width="480" height="120" rx="12" fill="url(#stepGradBlue)" filter="url(#cardShadow)" />
    <text x="400" y="670" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">研磨</text>
    <text x="400" y="705" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" opacity="0.95">熟豆研磨 → 咖啡细粉（增加萃取面积）</text>
  </g>

  <!-- 步骤 5：冲煮 -->
  <g id="step5">
    <rect x="160" y="780" width="480" height="120" rx="12" fill="url(#stepGradGreen)" filter="url(#cardShadow)" />
    <text x="400" y="830" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">冲煮</text>
    <text x="400" y="865" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" opacity="0.95">咖啡粉与热水接触 → 萃取得到一杯香浓咖啡</text>
  </g>

  <!-- 底部装饰线 -->
  <rect x="0" y="996" width="800" height="4" fill="#27AE60" opacity="0.5" />
</svg>