<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="50%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#1A3A5C"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F7FA"/>
    </linearGradient>
    
    <!-- 投影阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1A3A5C" flood-opacity="0.08"/>
    </filter>
    <filter id="nodeShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A3A5C" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 箭头定义 -->
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980B9"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#F39C12"/>
    </marker>

    <!-- 背景纹理图案 -->
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#FFFFFF" fill-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- 全局背景 -->
  <rect width="800" height="1100" fill="#F5F7FA"/>
  <rect y="0" width="800" height="100" fill="url(#headerGrad)"/>
  <rect y="0" width="800" height="100" fill="url(#dotPattern)"/>

  <!-- ================= 标题区域 ================= -->
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" letter-spacing="2">
    🧠 大语言模型基本原理
  </text>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="normal" fill="#FFFFFF" fill-opacity="0.8">
    基于 Transformer 架构的深度学习模型
  </text>

  <!-- ================= 架构区域（第1区） ================= -->
  <g transform="translate(40, 130)">
    <!-- 架构图背景卡片 -->
    <rect x="0" y="0" width="720" height="560" rx="16" fill="url(#cardGrad)" filter="url(#cardShadow)" stroke="#E0E6ED" stroke-width="1"/>
    
    <!-- 架构图标题 -->
    <text x="360" y="40" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#1A3A5C">
      ⚙️ Transformer 架构核心
    </text>
    <line x1="240" y1="55" x2="480" y2="55" stroke="#2980B9" stroke-width="2" stroke-opacity="0.5"/>

    <!-- 趣味细节：自注意力说明 -->
    <g transform="translate(540, 100)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="#FFF9E6" stroke="#F39C12" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="80" y="25" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#D35400">💡 核心创新</text>
      <text x="80" y="45" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#7F8C8D">并行计算序列中</text>
      <text x="80" y="60" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#7F8C8D">所有词对间的关联权重</text>
    </g>

    <!-- 第1层：词嵌入 + 位置编码 -->
    <g transform="translate(240, 480)">
      <rect x="0" y="0" width="240" height="65" rx="10" fill="#2980B9" filter="url(#nodeShadow)"/>
      <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">
        🔤 词嵌入 + 位置编码
      </text>
      <text x="120" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.9">
        将词语映射为向量，并注入位置信息
      </text>
    </g>
    <!-- 箭头：嵌入 -> 注意力 -->
    <line x1="360" y1="480" x2="360" y2="418" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowUp)"/>

    <!-- 第2层：自注意力机制（强调色-暖橙色） -->
    <g transform="translate(220, 350)">
      <rect x="0" y="0" width="280" height="70" rx="10" fill="#F39C12" filter="url(#nodeShadow)"/>
      <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">
        ⚡ 自注意力机制
      </text>
      <text x="140" y="52" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.95">
        捕捉长距离语义依赖关系
      </text>
    </g>
    <!-- 箭头：注意力 -> MHA -->
    <line x1="360" y1="350" x2="360" y2="288" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowUp)"/>

    <!-- 第3层：多头注意力 -->
    <g transform="translate(240, 220)">
      <rect x="0" y="0" width="240" height="65" rx="10" fill="#2980B9" filter="url(#nodeShadow)"/>
      <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">
        👁️ 多头注意力
      </text>
      <text x="120" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.9">
        从不同子空间并行学习关联特征
      </text>
    </g>
    <!-- 箭头：MHA -> FFN -->
    <line x1="360" y1="220" x2="360" y2="158" stroke="#2980B9" stroke-width="3" marker-end="url(#arrowUp)"/>

    <!-- 第4层：前馈神经网络 -->
    <g transform="translate(240, 90)">
      <rect x="0" y="0" width="240" height="65" rx="10" fill="#2980B9" filter="url(#nodeShadow)"/>
      <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">
        🧮 前馈神经网络
      </text>
      <text x="120" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.9">
        非线性变换，进一步提取高层特征
      </text>
    </g>

    <!-- 残差连接 & 层归一化（侧边环绕） -->
    <g transform="translate(660, 90)">
      <rect x="0" y="0" width="40" height="455" rx="8" fill="#1A3A5C" filter="url(#nodeShadow)"/>
      <text x="20" y="230" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" transform="rotate(-90, 20, 230)">
        🔄 残差连接 & 层归一化
      </text>
    </g>
    <!-- 连接 FFN 到残差块的箭头 -->
    <line x1="480" y1="122" x2="640" y2="122" stroke="#F39C12" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
    <line x1="480" y1="252" x2="640" y2="252" stroke="#F39C12" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
    <line x1="480" y1="382" x2="640" y2="382" stroke="#F39C12" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
    
    <!-- 残差块返回到 FFN/MHA/嵌入层的下行箭头 -->
    <path d="M 680 545 L 680 560 L 360 560 L 360 545" fill="none" stroke="#F39C12" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
    
    <!-- 架构图底部说明 -->
    <text x="360" y="540" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#7F8C8D">
      ⬆️ 数据自下而上流动 ｜ 虚线表示残差连接的回传路径
    </text>
  </g>

  <!-- ================= 流程区域（第2区） ================= -->
  <g transform="translate(40, 720)">
    <!-- 流程背景卡片 -->
    <rect x="0" y="0" width="720" height="220" rx="16" fill="url(#cardGrad)" filter="url(#cardShadow)" stroke="#E0E6ED" stroke-width="1"/>
    
    <!-- 流程标题 -->
    <text x="360" y="35" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#1A3A5C">
      🚀 训练生命周期
    </text>
    <line x1="260" y1="50" x2="460" y2="50" stroke="#2980B9" stroke-width="2" stroke-opacity="0.5"/>

    <!-- 趣味细节：流程说明 -->
    <g transform="translate(30, 70)">
      <text x="0" y="0" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#7F8C8D">
        💡 从通用知识学习到特定任务适配，最终与人类偏好对齐
      </text>
    </g>

    <!-- 节点1：预训练 -->
    <g transform="translate(60, 90)">
      <rect x="0" y="0" width="170" height="80" rx="10" fill="#1A3A5C" filter="url(#nodeShadow)"/>
      <text x="85" y="30" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">
        📚 预训练
      </text>
      <text x="85" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">
        海量无标注文本
      </text>
      <text x="85" y="68" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.7">
        （学习通用知识）
      </text>
    </g>
    <!-- 箭头：预训练 -> 微调 -->
    <line x1="230" y1="130" x2="290" y2="130" stroke="#7F8C8D" stroke-width="3" marker-end="url(#arrowRight)"/>
    <text x="260" y="120" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="20" fill="#7F8C8D" font-weight="bold">→</text>

    <!-- 节点2：微调 -->
    <g transform="translate(295, 90)">
      <rect x="0" y="0" width="170" height="80" rx="10" fill="#2980B9" filter="url(#nodeShadow)"/>
      <text x="85" y="30" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">
        🔧 微调
      </text>
      <text x="85" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.9">
        特定任务标注数据
      </text>
      <text x="85" y="68" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.7">
        （适配下游任务）
      </text>
    </g>
    <!-- 箭头：微调 -> RLHF -->
    <line x1="465" y1="130" x2="525" y2="130" stroke="#7F8C8D" stroke-width="3" marker-end="url(#arrowRight)"/>
    <text x="495" y="120" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="20" fill="#7F8C8D" font-weight="bold">→</text>

    <!-- 节点3：RLHF（强调色-暖橙色） -->
    <g transform="translate(530, 90)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="#F39C12" filter="url(#nodeShadow)"/>
      <text x="80" y="30" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">
        🎯 RLHF
      </text>
      <text x="80" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.95">
        人类反馈强化学习
      </text>
      <text x="80" y="68" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.8">
        （对齐人类偏好）
      </text>
    </g>
  </g>

  <!-- ================= 页脚区域（第3区） ================= -->
  <!-- 架构分类信息 -->
  <g transform="translate(40, 970)">
    <rect x="0" y="0" width="720" height="45" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E6ED" stroke-width="1"/>
    <text x="360" y="28" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#1A3A5C">
      🌟 典型代表：GPT（仅解码器）｜BERT（仅编码器）｜T5（编码器-解码器）
    </text>
  </g>

  <!-- 结尾点睛之笔 -->
  <text x="400" y="1050" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#2980B9" letter-spacing="1">
    ✨ 语言是人类思想的基石，而大模型正在学会理解它。✨
  </text>
  <text x="400" y="1080" text-anchor="middle" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#7F8C8D">
    信息图：大语言模型核心原理架构
  </text>

</svg>