<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    
    <!-- 中心节点渐变 -->
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#3B77BE"/>
    </linearGradient>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>

    <!-- 浅色卡片阴影 -->
    <filter id="lightShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.04"/>
    </filter>

    <!-- 箭头定义 -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#A0C4FF"/>
    </marker>

    <style>
      .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 32px; font-weight: bold; fill: #FFFFFF; }
      .subtitle { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 16px; font-weight: normal; fill: rgba(255,255,255,0.85); }
      .section-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 22px; font-weight: bold; fill: #2C3E50; }
      .node-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: bold; fill: #2C3E50; }
      .node-english { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; font-weight: normal; fill: #7F8C8D; }
      .node-desc { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 11px; font-weight: normal; fill: #5A6B8C; }
      .label-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; font-weight: 500; fill: #4A90D9; }
      .flow-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: 500; fill: #FFFFFF; }
      .flow-english { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: normal; fill: rgba(255,255,255,0.9); }
      .flow-desc { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 11px; font-weight: normal; fill: #FFFFFF; }
      .inference-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; font-weight: 500; fill: #2C3E50; text-anchor: middle; dominant-baseline: central; }
      .inference-highlight { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: bold; fill: #2C3E50; text-anchor: middle; dominant-baseline: central; }
      .footer-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; font-weight: normal; fill: #5A6B8C; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <!-- 全局背景 -->
  <rect x="0" y="0" width="800" height="1200" fill="#F8F9FF"/>

  <!-- ==================== 标题区域 ==================== -->
  <g id="title_section">
    <rect x="0" y="0" width="800" height="140" fill="url(#headerGrad)"/>
    <text x="400" y="60" text-anchor="middle" class="title">大语言模型的基本原理</text>
    <text x="400" y="100" text-anchor="middle" class="subtitle">深入探究 Transformer 架构、训练流程与推理机制</text>
    <line x1="200" y1="115" x2="600" y2="115" stroke="#FFFFFF" stroke-opacity="0.4" stroke-width="2"/>
  </g>

  <!-- ==================== Transformer 架构区域 ==================== -->
  <g id="transformer_section">
    <!-- 背景卡片 -->
    <rect x="30" y="160" width="740" height="500" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="400" y="200" text-anchor="middle" class="section-title">Transformer 架构组件</text>

    <!-- 中心节点 -->
    <rect x="300" y="360" width="200" height="70" rx="35" fill="url(#centerGrad)" filter="url(#cardShadow)"/>
    <text x="400" y="402" text-anchor="middle" class="flow-text">大语言模型</text>

    <!-- 连接线（中心到组件） -->
    <!-- 右上：词嵌入 -->
    <line x1="400" y1="395" x2="496" y2="305" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- 正右：多头自注意力 -->
    <line x1="400" y1="395" x2="525" y2="385" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- 左上：前馈网络 -->
    <line x1="400" y1="395" x2="184" y2="305" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- 左下：层归一化 -->
    <line x1="400" y1="395" x2="184" y2="465" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- 正左：残差连接 -->
    <line x1="400" y1="395" x2="165" y2="385" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- 右下：位置编码 -->
    <line x1="400" y1="395" x2="496" y2="465" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- 标签：包含 -->
    <text x="453" y="335" text-anchor="middle" class="label-text">包含</text>
    <text x="467" y="385" text-anchor="middle" class="label-text">包含</text>
    <text x="287" y="335" text-anchor="middle" class="label-text">包含</text>
    <text x="287" y="425" text-anchor="middle" class="label-text">包含</text>
    <text x="277" y="385" text-anchor="middle" class="label-text">包含</text>
    <text x="453" y="425" text-anchor="middle" class="label-text">包含</text>

    <!-- 组件节点 1：词嵌入 -->
    <rect x="496" y="270" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="551" y="295" text-anchor="middle" class="node-title">词嵌入</text>
    <text x="551" y="315" text-anchor="middle" class="node-english">Input Embedding</text>

    <!-- 组件节点 2：多头自注意力 -->
    <rect x="525" y="350" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="580" y="375" text-anchor="middle" class="node-title">多头自注意力</text>
    <text x="580" y="395" text-anchor="middle" class="node-english" font-size="9px">Multi-Head Self-Attention</text>

    <!-- 组件节点 3：前馈网络 -->
    <rect x="184" y="270" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="239" y="295" text-anchor="middle" class="node-title">前馈网络</text>
    <text x="239" y="315" text-anchor="middle" class="node-english">Feed-Forward Network</text>

    <!-- 组件节点 4：层归一化 -->
    <rect x="184" y="430" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="239" y="455" text-anchor="middle" class="node-title">层归一化</text>
    <text x="239" y="475" text-anchor="middle" class="node-english">Layer Normalization</text>

    <!-- 组件节点 5：残差连接 -->
    <rect x="165" y="350" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="220" y="375" text-anchor="middle" class="node-title">残差连接</text>
    <text x="220" y="395" text-anchor="middle" class="node-english">Residual Connection</text>

    <!-- 组件节点 6：位置编码 -->
    <rect x="496" y="430" width="110" height="65" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="551" y="455" text-anchor="middle" class="node-title">位置编码</text>
    <text x="551" y="475" text-anchor="middle" class="node-english">Positional Encoding</text>
  </g>

  <!-- ==================== 训练流程区域 ==================== -->
  <g id="training_section">
    <!-- 背景卡片 -->
    <rect x="30" y="700" width="740" height="230" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="400" y="735" text-anchor="middle" class="section-title">训练流程</text>

    <!-- 节点 1：预训练 -->
    <rect x="100" y="775" width="160" height="90" rx="12" fill="#4A90D9" filter="url(#lightShadow)"/>
    <text x="180" y="810" text-anchor="middle" class="flow-text">预训练</text>
    <text x="180" y="830" text-anchor="middle" class="flow-english">Pre-training</text>
    <text x="180" y="850" text-anchor="middle" class="flow-desc">在大规模语料上学习语言模式</text>

    <!-- 节点 2：监督微调 -->
    <rect x="320" y="775" width="160" height="90" rx="12" fill="#7B68EE" filter="url(#lightShadow)"/>
    <text x="400" y="810" text-anchor="middle" class="flow-text">监督微调</text>
    <text x="400" y="830" text-anchor="middle" class="flow-english">SFT</text>
    <text x="400" y="850" text-anchor="middle" class="flow-desc">在人工标注的指令数据上微调</text>

    <!-- 节点 3：RLHF -->
    <rect x="540" y="775" width="160" height="90" rx="12" fill="#FF6B6B" filter="url(#lightShadow)"/>
    <text x="620" y="810" text-anchor="middle" class="flow-text">RLHF</text>
    <text x="620" y="830" text-anchor="middle" class="flow-english">基于人类反馈的强化学习</text>
    <text x="620" y="850" text-anchor="middle" class="flow-desc">对齐人类偏好，优化输出</text>

    <!-- 连接箭头 -->
    <line x1="260" y1="820" x2="310" y2="820" stroke="#A0C4FF" stroke-width="2.5" marker-end="url(#arrowGray)"/>
    <line x1="480" y1="820" x2="530" y2="820" stroke="#A0C4FF" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  </g>

  <!-- ==================== 推理流程区域 ==================== -->
  <g id="inference_section">
    <!-- 背景卡片 -->
    <rect x="30" y="960" width="740" height="150" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="400" y="990" text-anchor="middle" class="section-title">推理流程</text>

    <!-- 节点 1：输入文本 -->
    <rect x="65" y="1040" width="70" height="50" rx="6" fill="#F0F4FF" stroke="#A0C4FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="100" y="1065" class="inference-text">输入文本</text>

    <!-- 节点 2：Tokenization -->
    <rect x="150" y="1040" width="70" height="50" rx="6" fill="#F0F4FF" stroke="#A0C4FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="185" y="1065" class="inference-text">Tokenization</text>

    <!-- 节点 3：Embedding -->
    <rect x="235" y="1040" width="70" height="50" rx="6" fill="#F0F4FF" stroke="#A0C4FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="270" y="1065" class="inference-text">Embedding</text>

    <!-- 节点 4：N层 Transformer Block（高亮放大） -->
    <rect x="320" y="1030" width="100" height="70" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="2" filter="url(#cardShadow)"/>
    <text x="370" y="1055" class="inference-highlight">N层 Transformer</text>
    <text x="370" y="1078" class="inference-highlight">Block</text>

    <!-- 节点 5：输出概率分布 -->
    <rect x="435" y="1040" width="70" height="50" rx="6" fill="#F0F4FF" stroke="#A0C4FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="470" y="1065" class="inference-text">输出概率分布</text>

    <!-- 节点 6：采样 / 贪心解码 -->
    <rect x="520" y="1040" width="70" height="50" rx="6" fill="#F0F4FF" stroke="#A0C4FF" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="555" y="1065" class="inference-text">采样 / 贪心解码</text>

    <!-- 节点 7：生成文本 -->
    <rect x="605" y="1040" width="70" height="50" rx="6" fill="#E8FCE8" stroke="#27AE60" stroke-width="1.5" filter="url(#lightShadow)"/>
    <text x="640" y="1065" class="inference-text" fill="#27AE60">生成文本</text>

    <!-- 推理流程箭头 -->
    <line x1="135" y1="1065" x2="145" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="220" y1="1065" x2="230" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="305" y1="1065" x2="315" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="420" y1="1065" x2="430" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="505" y1="1065" x2="515" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="590" y1="1065" x2="600" y2="1065" stroke="#A0C4FF" stroke-width="2" marker-end="url(#arrowGray)"/>
  </g>

  <!-- ==================== 底部说明区域 ==================== -->
  <g id="footer_section">
    <rect x="30" y="1130" width="740" height="55" rx="10" fill="#EDF2FF" filter="url(#lightShadow)"/>
    <text x="400" y="1157" class="footer-text">
      <tspan>注：大语言模型（LLM）基于 Transformer 架构，通过海量数据预训练学习语言规律，再经由</tspan>
      <tspan>监督微调（SFT）和人类反馈强化学习（RLHF）对齐，最终实现强大的语言生成与理解能力。</tspan>
    </text>
  </g>

</svg>