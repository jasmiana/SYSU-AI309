<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="100%" height="100%">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4A90D9" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-light" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A0AABF"/>
    </marker>
  </defs>

  <!-- 全局样式与背景 -->
  <style>
    .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: bold; fill: #FFFFFF; }
    .subtitle { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; fill: #E0E0FF; font-size: 16px; }
    .section-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: bold; font-size: 22px; fill: #2C3E50; }
    .node-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 600; font-size: 15px; fill: #2C3E50; text-anchor: middle; dominant-baseline: middle; }
    .node-text-center { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: bold; font-size: 22px; fill: #FFFFFF; text-anchor: middle; dominant-baseline: middle; }
    .node-text-transformer { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: bold; font-size: 16px; fill: #FFFFFF; text-anchor: middle; dominant-baseline: middle; }
    .flow-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: bold; font-size: 15px; fill: #FFFFFF; text-anchor: middle; dominant-baseline: middle; }
    .flow-text-infer { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-weight: 600; font-size: 13px; fill: #2C3E50; text-anchor: middle; dominant-baseline: middle; }
    .desc-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 13px; fill: #7F8C8D; text-anchor: middle; }
    .footer-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #A0AABF; text-anchor: middle; }
    .footer-note { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #7F8C8D; text-anchor: middle; }
    .path-line { fill: none; stroke: #A0AABF; stroke-width: 2; }
  </style>

  <rect width="800" height="1200" fill="#F8F9FF" />

  <!-- 标题区 -->
  <rect x="0" y="0" width="800" height="120" fill="url(#headerGrad)" />
  <text x="400" y="65" text-anchor="middle" class="title" font-size="32px">大语言模型的基本原理</text>
  <text x="400" y="98" text-anchor="middle" class="subtitle">理解驱动现代AI的核心概念与架构</text>

  <!-- 核心概念区 -->
  <g id="concept-map">
    <rect x="40" y="150" width="720" height="540" rx="16" fill="#FFFFFF" filter="url(#shadow-light)" />
    <text x="400" y="185" class="section-title">核心架构与关键组件</text>

    <!-- 连接线（绘制在节点下方） -->
    <g class="path-line" marker-end="url(#arrow)">
      <!-- 中心到 Transformer -->
      <path d="M 400 380 L 400 270" />
      <!-- 中心到编码器/解码器 -->
      <path d="M 300 410 L 210 410" />
      <path d="M 500 410 L 590 410" />
      <!-- Transformer 到右侧组件 -->
      <path d="M 500 245 L 520 245 L 520 485 L 590 485" />
      <path d="M 500 245 L 520 245 L 520 645 L 590 645" />
      <!-- Transformer 到左侧组件 -->
      <path d="M 300 245 L 280 245 L 280 485 L 210 485" />
      <path d="M 300 245 L 280 245 L 280 565 L 210 565" />
      <!-- Transformer 到底部组件 -->
      <path d="M 400 270 L 400 300 L 320 300 L 320 620" />
      <path d="M 400 270 L 400 300 L 480 300 L 480 620" />
      <!-- 子组件连接 -->
      <path d="M 670 510 L 670 540" />
      <path d="M 130 430 L 130 460" />
      <path d="M 130 510 L 130 540" />
    </g>

    <!-- 节点 -->
    <!-- 中心节点 -->
    <rect x="300" y="380" width="200" height="60" rx="30" fill="url(#centerGrad)" filter="url(#shadow)" />
    <text x="400" y="410" class="node-text-center">大语言模型</text>

    <!-- 顶部节点 -->
    <rect x="300" y="220" width="200" height="50" rx="25" fill="#4A90D9" filter="url(#shadow)" />
    <text x="400" y="245" class="node-text-transformer">Transformer架构</text>

    <!-- 左侧节点 -->
    <rect x="50" y="380" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="130" y="405" class="node-text">编码器</text>
    
    <rect x="50" y="460" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="130" y="485" class="node-text">词嵌入</text>
    
    <rect x="50" y="540" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="130" y="565" class="node-text">位置编码</text>

    <!-- 右侧节点 -->
    <rect x="590" y="380" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="670" y="405" class="node-text">解码器</text>
    
    <rect x="590" y="460" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="670" y="485" class="node-text">自注意力机制</text>
    
    <rect x="590" y="540" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="670" y="565" class="node-text">多头注意力</text>

    <rect x="590" y="620" width="160" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="670" y="645" class="node-text">前馈神经网络</text>

    <!-- 底部节点 -->
    <rect x="250" y="620" width="140" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="320" y="645" class="node-text">残差连接</text>
    
    <rect x="410" y="620" width="140" height="50" rx="15" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow-light)" />
    <text x="480" y="645" class="node-text">层归一化</text>
  </g>

  <!-- 训练流程区 -->
  <g id="training-flow">
    <rect x="40" y="720" width="720" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow-light)" />
    <text x="400" y="750" class="section-title">训练流程</text>
    
    <!-- 节点 -->
    <rect x="100" y="770" width="180" height="60" rx="30" fill="url(#trainGrad)" filter="url(#shadow)" />
    <text x="190" y="800" class="flow-text">预训练</text>
    <text x="190" y="865" class="desc-text">在大规模语料上学习语言模式</text>

    <rect x="310" y="770" width="180" height="60" rx="30" fill="url(#trainGrad)" filter="url(#shadow)" />
    <text x="400" y="800" class="flow-text">监督微调</text>
    <text x="400" y="865" class="desc-text">在指令数据上微调，学会遵循指令</text>

    <rect x="520" y="770" width="180" height="60" rx="30" fill="url(#trainGrad)" filter="url(#shadow)" />
    <text x="610" y="800" class="flow-text">RLHF</text>
    <text x="610" y="865" class="desc-text">强化学习，对齐人类偏好</text>

    <!-- 箭头 -->
    <g class="path-line" marker-end="url(#arrow)">
      <path d="M 280 800 L 310 800" />
      <path d="M 490 800 L 520 800" />
    </g>
  </g>

  <!-- 推理流程区 -->
  <g id="inference-flow">
    <rect x="40" y="910" width="720" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow-light)" />
    <text x="400" y="940" class="section-title">推理流程</text>
    
    <!-- 节点 -->
    <rect x="40" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="85" y="1010" class="flow-text-infer">输入文本</text>

    <rect x="145" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="190" y="1010" class="flow-text-infer">Tokenization</text>

    <rect x="250" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="295" y="1010" class="flow-text-infer">Embedding</text>

    <rect x="355" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="400" y="1005" class="flow-text-infer" font-size="12px">N层 Transformer</text>
    <text x="400" y="1025" class="flow-text-infer" font-size="12px">Block</text>

    <rect x="460" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="505" y="1010" class="flow-text-infer" font-size="12px">输出概率</text>
    <text x="505" y="1025" class="flow-text-infer" font-size="12px">分布</text>

    <rect x="565" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="610" y="1005" class="flow-text-infer" font-size="12px">采样/贪心</text>
    <text x="610" y="1025" class="flow-text-infer" font-size="12px">解码</text>

    <rect x="670" y="980" width="90" height="60" rx="8" fill="#FFFFFF" stroke="#7B68EE" stroke-width="2" filter="url(#shadow-light)" />
    <text x="715" y="1010" class="flow-text-infer">生成文本</text>

    <!-- 箭头 -->
    <g class="path-line" marker-end="url(#arrow)">
      <path d="M 130 1010 L 145 1010" />
      <path d="M 235 1010 L 250 1010" />
      <path d="M 340 1010 L 355 1010" />
      <path d="M 445 1010 L 460 1010" />
      <path d="M 550 1010 L 565 1010" />
      <path d="M 655 1010 L 670 1010" />
    </g>
  </g>

  <!-- 页脚区 -->
  <g id="footer">
    <rect x="0" y="1104" width="800" height="96" fill="#2C3E50" />
    <text x="400" y="1145" class="footer-text">大语言模型基础原理 · 人工智能知识科普</text>
    <text x="400" y="1175" class="footer-note">* GPT 和 BERT 等模型在自然语言处理（NLP）任务中取得了突破性进展。</text>
  </g>
</svg>