<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F4FF" />
    </radialGradient>
    
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9" />
      <stop offset="100%" stop-color="#7B68EE" />
    </linearGradient>

    <!-- 流程节点渐变 -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B68EE" />
      <stop offset="100%" stop-color="#4A90D9" />
    </linearGradient>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4A90D9" flood-opacity="0.08"/>
    </filter>

    <!-- 流程节点阴影 -->
    <filter id="flowShadow" x="-5%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <!-- 箭头定义 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A90D9"/>
    </marker>
  </defs>

  <!-- 全局背景 -->
  <rect width="800" height="1100" fill="url(#bgGrad)" />

  <!-- ================= 1. 标题区 ================= -->
  <rect x="40" y="30" width="720" height="70" rx="12" fill="url(#headerGrad)" filter="url(#cardShadow)" />
  <text x="400" y="72" text-anchor="middle" font-size="32" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    大语言模型的基本原理
  </text>
  <!-- 装饰线 -->
  <rect x="200" y="90" width="400" height="3" rx="1.5" fill="#FF6B6B" />

  <!-- ================= 2. 定义区 ================= -->
  <rect x="40" y="130" width="720" height="85" rx="8" fill="#FFFFFF" stroke="#E8ECF1" stroke-width="1" filter="url(#cardShadow)" />
  <!-- 定义标签 -->
  <rect x="50" y="140" width="48" height="24" rx="12" fill="#2C3E50" />
  <text x="74" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">定义</text>
  
  <text font-size="14" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="112" y="160">大语言模型是基于Transformer架构的深度学习模型，通过自注意力机制捕捉文本中的长距离依赖关系。</tspan>
    <tspan x="112" y="185">模型将输入文本转化为词嵌入向量，经过多头注意力层和前馈网络，逐步理解语义。</tspan>
  </text>

  <!-- ================= 3. 核心原理区 ================= -->
  <text x="60" y="260" font-size="24" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    核心原理
  </text>

  <!-- 卡片 1: 词嵌入 -->
  <rect x="60" y="285" width="320" height="155" rx="8" fill="#FFFFFF" stroke="#E8ECF1" stroke-width="1" filter="url(#cardShadow)" />
  <rect x="60" y="285" width="8" height="155" rx="4" fill="#4A90D9" />
  <!-- 图标 -->
  <circle cx="93" cy="330" r="10" fill="#EBF0FF" stroke="#4A90D9" stroke-width="2" />
  <circle cx="93" cy="330" r="4" fill="#4A90D9" />
  <text x="110" y="335" font-size="16" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    词嵌入 (Word Embedding)
  </text>
  <text font-size="13" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="80" y="365">将离散的词语映射为连续向量，</tspan>
    <tspan x="80" y="385">捕捉词语之间的语义关系，</tspan>
    <tspan x="80" y="405">使语义相近的词在向量空间中距离更近。</tspan>
  </text>

  <!-- 卡片 2: 多头自注意力 -->
  <rect x="420" y="285" width="320" height="155" rx="8" fill="#FFFFFF" stroke="#E8ECF1" stroke-width="1" filter="url(#cardShadow)" />
  <rect x="420" y="285" width="8" height="155" rx="4" fill="#7B68EE" />
  <!-- 图标 -->
  <path d="M443 330 L449 320 M449 320 L455 330 M449 320 L449 340" stroke="#7B68EE" stroke-width="2" fill="none" />
  <line x1="455" y1="330" x2="470" y2="330" stroke="#7B68EE" stroke-width="2" />
  <circle cx="470" cy="330" r="10" fill="#EBF0FF" stroke="#7B68EE" stroke-width="2" />
  <text x="490" y="335" font-size="16" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    多头自注意力 (Multi-Head)
  </text>
  <text font-size="13" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="440" y="365">从不同角度并行关注输入序列，</tspan>
    <tspan x="440" y="385">动态计算词语间的依赖权重，</tspan>
    <tspan x="440" y="405">有效建模长距离上下文关系。</tspan>
  </text>

  <!-- 卡片 3: 残差连接与层归一化 -->
  <rect x="60" y="470" width="320" height="155" rx="8" fill="#FFFFFF" stroke="#E8ECF1" stroke-width="1" filter="url(#cardShadow)" />
  <rect x="60" y="470" width="8" height="155" rx="4" fill="#FF6B6B" />
  <!-- 图标 -->
  <path d="M83 515 L97 515 M91 509 L83 515 L91 521" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M103 510 L117 510 M111 504 L103 510 L111 516" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <text x="130" y="520" font-size="16" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    残差连接与层归一化
  </text>
  <text font-size="13" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="80" y="550">缓解深层网络的梯度消失问题，</tspan>
    <tspan x="80" y="570">通过跨层连接保留原始信息，</tspan>
    <tspan x="80" y="590">结合层归一化稳定并加速训练。</tspan>
  </text>

  <!-- 卡片 4: 前馈网络 -->
  <rect x="420" y="470" width="320" height="155" rx="8" fill="#FFFFFF" stroke="#E8ECF1" stroke-width="1" filter="url(#cardShadow)" />
  <rect x="420" y="470" width="8" height="155" rx="4" fill="#4A90D9" />
  <!-- 图标 -->
  <rect x="443" y="515" width="14" height="2" rx="1" fill="#4A90D9" />
  <rect x="443" y="521" width="10" height="2" rx="1" fill="#4A90D9" />
  <circle cx="475" cy="520" r="10" fill="#EBF0FF" stroke="#4A90D9" stroke-width="2" />
  <polygon points="471,516 479,516 479,524 471,524" fill="#4A90D9" />
  <text x="495" y="525" font-size="16" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    前馈网络 (FFN)
  </text>
  <text font-size="13" fill="#4A5568" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="440" y="555">对每个位置的向量进行非线性变换，</tspan>
    <tspan x="440" y="575">通过线性层与激活函数组合，</tspan>
    <tspan x="440" y="595">增强模型的表达能力与拟合能力。</tspan>
  </text>

  <!-- ================= 4. 训练与适配流程区 ================= -->
  <text x="60" y="680" font-size="24" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    训练与适配流程
  </text>

  <!-- 节点 1: 预训练 -->
  <rect x="80" y="710" width="180" height="50" rx="25" fill="url(#flowGrad)" filter="url(#flowShadow)" />
  <text x="170" y="740" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    预训练 (Pre-train)
  </text>
  
  <!-- 箭头 1 -->
  <line x1="265" y1="735" x2="295" y2="735" stroke="#4A90D9" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 节点 2: 微调 -->
  <rect x="310" y="710" width="180" height="50" rx="25" fill="url(#flowGrad)" filter="url(#flowShadow)" />
  <text x="400" y="740" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    微调 (Fine-tune)
  </text>
  
  <!-- 箭头 2 -->
  <line x1="495" y1="735" x2="525" y2="735" stroke="#4A90D9" stroke-width="3" marker-end="url(#arrow)" />

  <!-- 节点 3: 应用 -->
  <rect x="540" y="710" width="180" height="50" rx="25" fill="#FF6B6B" filter="url(#flowShadow)" />
  <text x="630" y="740" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    应用 (Apply)
  </text>

  <!-- 标注文本 -->
  <text font-size="12" fill="#718096" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    <tspan x="170" y="780" text-anchor="middle">海量数据自监督学习</tspan>
    <tspan x="400" y="780" text-anchor="middle">少量任务数据调优</tspan>
    <tspan x="630" y="780" text-anchor="middle">部署适配各类场景</tspan>
  </text>

  <!-- ================= 5. 应用场景区 ================= -->
  <rect x="40" y="830" width="720" height="80" rx="40" fill="#FFFFFF" stroke="#E0E4F0" stroke-width="1" filter="url(#cardShadow)" />
  
  <text x="400" y="855" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    适配场景 (下游任务)
  </text>

  <!-- 场景标签 -->
  <rect x="90" y="868" width="110" height="30" rx="15" fill="#F0F5FF" />
  <text x="145" y="888" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">机器翻译</text>

  <rect x="215" y="868" width="110" height="30" rx="15" fill="#F8F0FF" />
  <text x="270" y="888" text-anchor="middle" font-size="13" fill="#7B68EE" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">智能问答</text>

  <rect x="340" y="868" width="110" height="30" rx="15" fill="#F0F5FF" />
  <text x="395" y="888" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">文本摘要</text>

  <rect x="465" y="868" width="110" height="30" rx="15" fill="#F8F0FF" />
  <text x="520" y="888" text-anchor="middle" font-size="13" fill="#7B68EE" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">对话生成</text>

  <rect x="590" y="868" width="110" height="30" rx="15" fill="#F0F5FF" />
  <text x="645" y="888" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">代码编写</text>

  <!-- ================= 6. 页脚区 ================= -->
  <rect x="200" y="970" width="400" height="1" fill="#E8ECF1" />
  <text x="400" y="1010" text-anchor="middle" font-size="12" fill="#A0AEC0" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
    数据来源：大语言模型（LLM）基本原理调研
  </text>
</svg>