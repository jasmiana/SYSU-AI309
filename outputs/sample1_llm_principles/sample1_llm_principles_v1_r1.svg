<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="800" height="1050">
  <defs>
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    
    <!-- 箭头标记 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA8B8"/>
    </marker>

    <!-- 投影滤镜 -->
    <filter id="boxShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4A90D9" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A2A4A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 32px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    .section-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 20px; font-weight: bold; fill: #1A2A4A; text-anchor: middle; }
    .box-main-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .box-sub-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; font-weight: normal; text-anchor: middle; }
    .center-main-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 24px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    .center-sub-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: normal; fill: #E0E8FF; text-anchor: middle; }
    .link-line { fill: none; stroke: #9AA8B8; stroke-width: 2; marker-end: url(#arrow); }
  </style>

  <!-- 背景 -->
  <rect width="800" height="1050" fill="#F8F9FF"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="800" height="80" fill="url(#headerGrad)"/>
  <text x="400" y="45" dy="0.35em" class="title">大语言模型基本原理</text>
  
  <!-- 装饰元素 -->
  <circle cx="280" cy="40" r="4" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="300" cy="40" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="520" cy="40" r="4" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="540" cy="40" r="2" fill="#FFFFFF" opacity="0.6"/>

  <!-- 中心节点 -->
  <rect x="250" y="120" width="300" height="160" rx="16" fill="#4A90D9" filter="url(#boxShadow)"/>
  <text x="400" y="180" dy="0.35em" class="center-main-text">大语言模型</text>
  <text x="400" y="215" dy="0.35em" class="center-sub-text">基于Transformer · 自注意力机制</text>
  <text x="400" y="240" dy="0.35em" class="center-sub-text">海量参数 · 涌现能力</text>

  <!-- 连接线（中心节点到四个区域） -->
  <path d="M 400 280 L 400 315 L 210 315 L 210 345" class="link-line"/>
  <path d="M 400 280 L 400 315 L 590 315 L 590 345" class="link-line"/>
  <path d="M 400 280 L 400 685 L 210 685 L 210 715" class="link-line"/>
  <path d="M 400 280 L 400 685 L 590 685 L 590 715" class="link-line"/>

  <!-- 区域 1：训练阶段 -->
  <g id="section-training">
    <rect x="40" y="350" width="340" height="320" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="210" y="385" dy="0.35em" class="section-title">训练阶段</text>

    <!-- 节点 1 -->
    <rect x="70" y="420" width="280" height="50" rx="6" fill="#7B68EE"/>
    <text x="210" y="438" dy="0.35em" class="box-main-text" fill="#FFFFFF">预训练 (Pre-training)</text>
    <text x="210" y="456" dy="0.35em" class="box-sub-text" fill="#E0DDFF">学习语言模式 · 预测下一个词</text>
    <path d="M 210 470 L 210 485" class="link-line"/>

    <!-- 节点 2 -->
    <rect x="70" y="490" width="280" height="50" rx="6" fill="#7B68EE"/>
    <text x="210" y="508" dy="0.35em" class="box-main-text" fill="#FFFFFF">监督微调 (SFT)</text>
    <text x="210" y="526" dy="0.35em" class="box-sub-text" fill="#E0DDFF">依据人工指令 · 学会听从命令</text>
    <path d="M 210 540 L 210 555" class="link-line"/>

    <!-- 节点 3 -->
    <rect x="70" y="560" width="280" height="50" rx="6" fill="#7B68EE"/>
    <text x="210" y="578" dy="0.35em" class="box-main-text" fill="#FFFFFF">人类反馈强化学习 (RLHF)</text>
    <text x="210" y="596" dy="0.35em" class="box-sub-text" fill="#E0DDFF">对齐人类偏好 · 优化输出</text>
  </g>

  <!-- 区域 2：推理流程 -->
  <g id="section-inference">
    <rect x="420" y="350" width="340" height="320" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="590" y="385" dy="0.35em" class="section-title">推理流程</text>

    <!-- 节点 1 -->
    <rect x="450" y="410" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="430" dy="0.35em" class="box-main-text" fill="#FFFFFF">输入文本 (Input)</text>
    <path d="M 590 450 L 590 459" class="link-line"/>

    <!-- 节点 2 -->
    <rect x="450" y="464" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="484" dy="0.35em" class="box-main-text" fill="#FFFFFF">分词 (Tokenization)</text>
    <path d="M 590 504 L 590 513" class="link-line"/>

    <!-- 节点 3 -->
    <rect x="450" y="518" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="538" dy="0.35em" class="box-main-text" fill="#FFFFFF">嵌入 (Embedding)</text>
    <path d="M 590 558 L 590 567" class="link-line"/>

    <!-- 节点 4 -->
    <rect x="450" y="572" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="592" dy="0.35em" class="box-main-text" fill="#FFFFFF">多层Transformer块</text>
    <path d="M 590 612 L 590 621" class="link-line"/>

    <!-- 节点 5 -->
    <rect x="450" y="626" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="646" dy="0.35em" class="box-main-text" fill="#FFFFFF">输出概率分布</text>
    <path d="M 590 666 L 590 675" class="link-line"/>

    <!-- 节点 6 -->
    <rect x="450" y="680" width="280" height="40" rx="6" fill="#3498DB"/>
    <text x="590" y="700" dy="0.35em" class="box-main-text" fill="#FFFFFF">采样/贪心解码</text>
  </g>

  <!-- 区域 3：Transformer核心 -->
  <g id="section-architecture">
    <rect x="40" y="720" width="340" height="220" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="210" y="755" dy="0.35em" class="section-title">Transformer核心组件</text>

    <rect x="70" y="770" width="280" height="40" rx="6" fill="#2C3E50"/>
    <text x="210" y="790" dy="0.35em" class="box-main-text" fill="#FFFFFF">多头自注意力 (Self-Attention)</text>

    <rect x="70" y="820" width="280" height="40" rx="6" fill="#2C3E50"/>
    <text x="210" y="840" dy="0.35em" class="box-main-text" fill="#FFFFFF">前馈网络 (FFN)</text>

    <rect x="70" y="870" width="140" height="40" rx="6" fill="#2C3E50"/>
    <text x="140" y="890" dy="0.35em" class="box-main-text" fill="#FFFFFF">位置编码</text>

    <rect x="210" y="870" width="140" height="40" rx="6" fill="#2C3E50"/>
    <text x="280" y="890" dy="0.35em" class="box-main-text" fill="#FFFFFF">层归一化 &amp; 残差</text>
  </g>

  <!-- 区域 4：模型关键能力 -->
  <g id="section-capability">
    <rect x="420" y="720" width="340" height="220" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="590" y="755" dy="0.35em" class="section-title">模型关键能力</text>

    <rect x="450" y="770" width="280" height="40" rx="6" fill="#FF6B6B"/>
    <text x="590" y="785" dy="0.35em" class="box-main-text" fill="#FFFFFF">涌现能力 (Emergence)</text>
    <text x="590" y="803" dy="0.35em" class="box-sub-text" fill="#FFD5D5">规模扩大带来的质变</text>

    <rect x="450" y="830" width="280" height="40" rx="6" fill="#FF6B6B"/>
    <text x="590" y="845" dy="0.35em" class="box-main-text" fill="#FFFFFF">上下文学习 (ICL)</text>
    <text x="590" y="863" dy="0.35em" class="box-sub-text" fill="#FFD5D5">根据示例进行学习</text>

    <rect x="450" y="890" width="280" height="40" rx="6" fill="#FF6B6B"/>
    <text x="590" y="905" dy="0.35em" class="box-main-text" fill="#FFFFFF">思维链 (Chain-of-Thought)</text>
    <text x="590" y="923" dy="0.35em" class="box-sub-text" fill="#FFD5D5">逐步推理解决复杂问题</text>
  </g>
</svg>