<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- 标题栏渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#6C63FF" flood-opacity="0.08"/>
    </filter>
    <filter id="lightShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.05"/>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrowAxis" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95A5A6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- 全局背景 -->
  <rect width="800" height="1200" fill="#F8F9FF" />

  <!-- ==================== 标题区（5% x 0% x 90% x 10%）==================== -->
  <rect x="0" y="0" width="800" height="120" fill="url(#headerGrad)" />
  <text x="400" y="52" text-anchor="middle" fill="#FFFFFF" font-size="30" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量（Word Embedding）基本概念通俗解释</text>
  <text x="400" y="85" text-anchor="middle" fill="#E0E0FF" font-size="18" font-weight="500" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">让计算机理解词语含义的魔法</text>

  <!-- ==================== 上部内容块（5% x 10% x 90% x 25%）==================== -->
  <g transform="translate(40, 135)">
    <rect x="0" y="0" width="720" height="270" rx="12" fill="#FFFFFF" filter="url(#cardShadow)" />
    <text x="25" y="35" fill="#2C3E50" font-size="22" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">什么是词向量？</text>
    
    <text x="25" y="70" fill="#34495E" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量将每个单词映射为固定长度的稠密向量，例如 "苹果" 可以表示为</text>
    <text x="25" y="95" fill="#34495E" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">[0.2, 0.8, -0.3, 0.5, ...]。这些数字代表词的语义特征，使得意义相近的</text>
    <text x="25" y="120" fill="#34495E" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量距离更近。独热编码是早期方法，但维度高、无法表达相似性；</text>
    <text x="25" y="145" fill="#34495E" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量则完美解决了这一问题。它通过分布式表示，用向量中的数值组合</text>
    <text x="25" y="170" fill="#34495E" font-size="15" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">来代表语义，极大地提升了计算机对自然语言的理解能力。</text>

    <!-- 向量演示框 -->
    <rect x="25" y="195" width="670" height="50" rx="8" fill="#F4F4FF" stroke="#6C63FF" stroke-width="1.5" />
    <text x="360" y="225" text-anchor="middle" fill="#6C63FF" font-size="16" font-family="monospace" font-weight="bold">苹果 → [0.2, 0.8, -0.3, 0.5, -0.1, 0.9, 0.4, -0.7]</text>
  </g>

  <!-- ==================== 中部内容块（5% x 35% x 90% x 35%）==================== -->
  <g transform="translate(40, 435)">
    <rect x="0" y="0" width="720" height="390" rx="12" fill="#FFFFFF" filter="url(#cardShadow)" />
    <text x="25" y="35" fill="#2C3E50" font-size="22" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量语义空间：相似词汇聚集在一起</text>

    <!-- 散点图区域 -->
    <rect x="25" y="55" width="670" height="315" rx="8" fill="#FCFCFF" stroke="#E0E0E0" stroke-width="1" />
    
    <!-- 坐标轴 -->
    <line x1="110" y1="75" x2="110" y2="340" stroke="#95A5A6" stroke-width="2" marker-end="url(#arrowAxis)" />
    <line x1="110" y1="340" x2="660" y2="340" stroke="#95A5A6" stroke-width="2" marker-end="url(#arrowAxis)" />
    <text x="650" y="355" text-anchor="end" fill="#7F8C8D" font-size="14" font-weight="500">维度 1（PC1）</text>
    <text x="100" y="70" text-anchor="end" fill="#7F8C8D" font-size="14" font-weight="500">维度 2（PC2）</text>

    <!-- 聚类区域（椭圆） -->
    <!-- 水果簇 -->
    <ellipse cx="280" cy="260" rx="80" ry="65" fill="#FF6B6B" fill-opacity="0.15" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="5,5" />
    <text x="280" y="210" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">🍎 水果类</text>
    
    <!-- 动物簇 -->
    <ellipse cx="460" cy="180" rx="90" ry="75" fill="#27AE60" fill-opacity="0.15" stroke="#27AE60" stroke-width="2" stroke-dasharray="5,5" />
    <text x="460" y="125" text-anchor="middle" fill="#27AE60" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">🐾 动物类</text>
    
    <!-- 皇室/抽象概念簇 -->
    <ellipse cx="580" cy="280" rx="85" ry="80" fill="#8E44AD" fill-opacity="0.15" stroke="#8E44AD" stroke-width="2" stroke-dasharray="5,5" />
    <text x="580" y="215" text-anchor="middle" fill="#8E44AD" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">👑 抽象概念类</text>

    <!-- 散点（数据点） -->
    <!-- 注意：使用 paint-order="stroke" 为文字添加白色描边，防止被背景遮挡 -->
    <!-- 水果类 -->
    <circle cx="240" cy="240" r="7" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="2" />
    <text x="255" y="245" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">苹果</text>
    <circle cx="320" cy="280" r="7" fill="#FF6B6B" stroke="#FFFFFF" stroke-width="2" />
    <text x="335" y="285" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">香蕉</text>

    <!-- 动物类 -->
    <circle cx="420" cy="160" r="7" fill="#27AE60" stroke="#FFFFFF" stroke-width="2" />
    <text x="435" y="165" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">猫</text>
    <circle cx="490" cy="200" r="7" fill="#27AE60" stroke="#FFFFFF" stroke-width="2" />
    <text x="505" y="205" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">狗</text>

    <!-- 抽象概念类 -->
    <circle cx="540" cy="250" r="7" fill="#8E44AD" stroke="#FFFFFF" stroke-width="2" />
    <text x="555" y="255" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">女王</text>
    <circle cx="620" cy="310" r="7" fill="#8E44AD" stroke="#FFFFFF" stroke-width="2" />
    <text x="635" y="315" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">国王</text>
    <circle cx="560" cy="320" r="7" fill="#8E44AD" stroke="#FFFFFF" stroke-width="2" />
    <text x="575" y="325" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">男人</text>
    <circle cx="610" cy="270" r="7" fill="#8E44AD" stroke="#FFFFFF" stroke-width="2" />
    <text x="625" y="275" fill="#2C3E50" font-size="14" font-weight="500" paint-order="stroke" stroke="#FFFFFF" stroke-width="3" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">女人</text>
  </g>

  <!-- ==================== 下部内容块（5% x 70% x 90% x 22%）==================== -->
  <g transform="translate(40, 855)">
    <rect x="0" y="0" width="720" height="230" rx="12" fill="#FFFFFF" filter="url(#cardShadow)" />
    <text x="25" y="35" fill="#2C3E50" font-size="22" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">词向量的语义迁移能力：经典类比法</text>

    <!-- 左侧：Man -> King -->
    <rect x="80" y="60" width="100" height="40" rx="6" fill="#E8E8FF" stroke="#6C63FF" stroke-width="1.5" />
    <text x="130" y="85" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">man</text>
    
    <rect x="80" y="150" width="100" height="40" rx="6" fill="#E8E8FF" stroke="#6C63FF" stroke-width="1.5" />
    <text x="130" y="175" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">king</text>

    <!-- 左侧箭头 -->
    <path d="M 130 100 L 130 140" stroke="#6C63FF" stroke-width="4" marker-end="url(#arrowBlue)" />
    <text x="145" y="125" fill="#6C63FF" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">+ 王权</text>

    <!-- 右侧：Woman -> Queen -->
    <rect x="540" y="60" width="100" height="40" rx="6" fill="#E8E8FF" stroke="#6C63FF" stroke-width="1.5" />
    <text x="590" y="85" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">woman</text>
    
    <rect x="540" y="150" width="100" height="40" rx="6" fill="#E8E8FF" stroke="#6C63FF" stroke-width="1.5" />
    <text x="590" y="175" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">queen</text>

    <!-- 右侧箭头 -->
    <path d="M 590 100 L 590 140" stroke="#6C63FF" stroke-width="4" marker-end="url(#arrowBlue)" />
    <text x="605" y="125" fill="#6C63FF" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">+ 王权</text>

    <!-- 中间连接线 -->
    <line x1="180" y1="125" x2="540" y2="125" stroke="#95A5A6" stroke-width="2" stroke-dasharray="6,4" />
    <text x="360" y="115" text-anchor="middle" fill="#7F8C8D" font-size="14" font-weight="500" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">语义关系迁移</text>

    <!-- 底部公式 -->
    <rect x="230" y="195" width="260" height="30" rx="15" fill="#FF6B6B" fill-opacity="0.1" stroke="#FF6B6B" stroke-width="1" />
    <text x="360" y="215" text-anchor="middle" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">king - man + woman ≈ queen</text>
  </g>

  <!-- ==================== 页脚区（5% x 92% x 90% x 8%）==================== -->
  <g transform="translate(40, 1110)">
    <rect x="0" y="0" width="720" height="80" rx="8" fill="#FFFFFF" filter="url(#lightShadow)" stroke="#E0E0FF" stroke-width="1" />
    <text x="360" y="32" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">主流模型：Word2Vec (CBOW &amp; Skip-gram) | GloVe | FastText</text>
    <text x="360" y="62" text-anchor="middle" fill="#7F8C8D" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">广泛应用于：文本分类、情感分析、机器翻译等 NLP 任务</text>
  </g>

</svg>