<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="800" height="1050">
    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F8F9FF"/>
            <stop offset="100%" stop-color="#F0F2FF"/>
        </linearGradient>

        <!-- 中心节点渐变 -->
        <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A90D9"/>
            <stop offset="100%" stop-color="#7B68EE"/>
        </linearGradient>

        <!-- 子节点渐变 -->
        <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7B68EE"/>
            <stop offset="100%" stop-color="#6A5ACD"/>
        </linearGradient>

        <!-- 投影阴影 -->
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
        </filter>

        <!-- 箭头标记 -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
        </marker>

        <!-- 背景点状图案 -->
        <pattern id="dotPattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
            <circle cx="15" cy="15" r="1.5" fill="#D0D5E0" opacity="0.4"/>
        </pattern>
    </defs>

    <!-- 背景 -->
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    <rect width="100%" height="100%" fill="url(#dotPattern)"/>

    <!-- 标题区域 -->
    <g id="title-section">
        <text x="400" y="65" text-anchor="middle" fill="#1E293B" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="32" font-weight="bold" letter-spacing="1">词向量：让计算机理解词语的意义</text>
    </g>

    <!-- 图表区域 -->
    <g id="diagram-section">
        <!-- 中心虚线圈 -->
        <circle cx="400" cy="540" r="95" fill="none" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>

        <!-- 连接线（箭头） -->
        <g id="connections" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrowhead)">
            <!-- 顶部：定义 -->
            <line x1="400" y1="540" x2="400" y2="300"/>
            <!-- 右上：相似性 -->
            <line x1="400" y1="540" x2="628" y2="614"/>
            <!-- 右下：方法 -->
            <line x1="400" y1="540" x2="541" y2="734"/>
            <!-- 左下：类比 -->
            <line x1="400" y1="540" x2="259" y2="734"/>
            <!-- 左上：应用 -->
            <line x1="400" y1="540" x2="172" y2="614"/>
        </g>

        <!-- 子节点 -->
        <g id="sub-nodes" fill="url(#nodeGrad)" stroke="#FFFFFF" stroke-width="3" filter="url(#shadow)" rx="12">
            <!-- 节点 1：定义（顶部） -->
            <rect x="295" y="265" width="210" height="70" rx="12"/>
            <text x="400" y="317" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold">语义映射</text>
            <text x="400" y="342" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" opacity="0.9">词语 → 实数向量</text>

            <!-- 节点 2：相似性（右上） -->
            <rect x="523" y="579" width="210" height="70" rx="12"/>
            <text x="628" y="631" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold">语义相似性</text>
            <text x="628" y="656" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" opacity="0.9">空间距离近</text>

            <!-- 节点 3：方法（右下） -->
            <rect x="436" y="699" width="210" height="70" rx="12"/>
            <text x="541" y="751" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold">训练方法</text>
            <text x="541" y="776" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" opacity="0.9">Word2Vec &amp; GloVe</text>

            <!-- 节点 4：类比（左下） -->
            <rect x="154" y="699" width="210" height="70" rx="12"/>
            <text x="259" y="751" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold">类比运算</text>
            <text x="259" y="776" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" opacity="0.9">国王-男人+女人≈王后</text>

            <!-- 节点 5：应用（左上） -->
            <rect x="67" y="579" width="210" height="70" rx="12"/>
            <text x="172" y="631" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="17" font-weight="bold">应用场景</text>
            <text x="172" y="656" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" opacity="0.9">翻译、情感分析、问答</text>
        </g>

        <!-- 中心节点 -->
        <g id="center-node">
            <circle cx="400" cy="540" r="70" fill="url(#centerGrad)" filter="url(#shadow)" stroke="#FFFFFF" stroke-width="4"/>
            <text x="400" y="548" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="bold">词向量</text>
        </g>
    </g>

    <!-- 页脚区域 -->
    <g id="footer-section">
        <line x1="300" y1="1010" x2="500" y2="1010" stroke="#D0D5E0" stroke-width="2"/>
        <text x="400" y="1040" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" letter-spacing="0.5">词向量技术是自然语言处理的基础，让机器理解语言的内涵。</text>
    </g>
</svg>