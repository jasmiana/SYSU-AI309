<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#7B68EE"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4A90D9" flood-opacity="0.06"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>

    <!-- 标记（箭头） -->
    <marker id="arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A90D9"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#FF6B6B"/>
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#7F8C8D"/>
    </marker>
    <marker id="arrow-analogy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B68EE"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 32px; font-weight: bold; fill: #FFFFFF; }
    .section-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 22px; font-weight: 600; fill: #2C3E50; }
    .body-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 16px; fill: #7F8C8D; }
    .code-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #4A90D9; font-weight: bold; }
    .label-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #2C3E50; }
    .axis-label { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #7F8C8D; }
    .footer-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #FFFFFF; }
    .chip-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #FFFFFF; font-weight: bold; }
    .cluster-label { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; font-weight: bold; }
  </style>

  <!-- 全局背景 -->
  <rect width="800" height="1100" fill="#F8F9FF"/>

  <!-- ================= 标题栏 ================= -->
  <g id="sec_title">
    <rect x="0" y="0" width="800" height="80" fill="url(#headerGrad)"/>
    <text x="400" y="48" text-anchor="middle" class="title">词向量（Word Embedding）的基本概念</text>
  </g>

  <!-- ================= 概念部分 ================= -->
  <g id="sec_concept">
    <!-- 卡片 -->
    <rect x="40" y="110" width="720" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    
    <!-- 装饰条 -->
    <rect x="40" y="110" width="6" height="40" rx="3" fill="#4A90D9" opacity="0.8"/>
    
    <!-- 标题 -->
    <text x="70" y="155" class="section-title">什么是词向量？</text>
    
    <!-- 正文 -->
    <text x="70" y="195" class="body-text">将自然语言中的词映射为固定长度的实数向量，</text>
    <text x="70" y="220" class="body-text">实现从离散符号到连续数值空间的关键转换。</text>
    <text x="70" y="245" class="body-text">基于 Word2Vec 和 GloVe 等模型，依托大规模文本语料训练得出。</text>
    
    <!-- 向量可视化框 -->
    <rect x="480" y="135" width="240" height="100" rx="8" fill="#F4F8FF" stroke="#D0DFFF" stroke-width="1.5"/>
    
    <!-- 代码文本 -->
    <text x="500" y="160" class="code-text">[ 0.21, 0.86, -0.32,</text>
    <text x="500" y="182" class="code-text">  0.55, 0.91, -0.14,</text>
    <text x="500" y="204" class="code-text"> -0.73, 0.62, ... ]</text>
    
    <!-- 连接箭头 -->
    <line x1="430" y1="190" x2="470" y2="190" stroke="#4A90D9" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow-right)"/>
    
    <!-- 箭头上下标签 -->
    <text x="450" y="178" text-anchor="middle" class="label-text" fill="#4A90D9">映射</text>
  </g>

  <!-- ================= 语义空间部分 ================= -->
  <g id="sec_semantic_space">
    <!-- 卡片 -->
    <rect x="40" y="330" width="720" height="370" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    
    <!-- 装饰条 -->
    <rect x="40" y="330" width="6" height="40" rx="3" fill="#7B68EE" opacity="0.8"/>
    
    <!-- 标题 -->
    <text x="70" y="375" class="section-title">语义空间映射与距离</text>
    
    <!-- 正文 -->
    <text x="70" y="405" class="body-text">向量空间中的距离反映了词语的语义相似度，同类词语自然聚集。</text>
    
    <!-- 图表背景 -->
    <rect x="100" y="440" width="600" height="220" fill="#FBFBFD" rx="8" stroke="#F0F0F5" stroke-width="1"/>
    
    <!-- 网格线 -->
    <g stroke="#E4E8F0" stroke-width="1" stroke-dasharray="4,4">
      <line x1="200" y1="440" x2="200" y2="660"/>
      <line x1="300" y1="440" x2="300" y2="660"/>
      <line x1="400" y1="440" x2="400" y2="660"/>
      <line x1="500" y1="440" x2="500" y2="660"/>
      <line x1="600" y1="440" x2="600" y2="660"/>
      <line x1="100" y1="495" x2="700" y2="495"/>
      <line x1="100" y1="550" x2="700" y2="550"/>
      <line x1="100" y1="605" x2="700" y2="605"/>
    </g>
    
    <!-- 坐标轴 -->
    <line x1="100" y1="660" x2="700" y2="660" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow-right)"/>
    <line x1="100" y1="660" x2="100" y2="440" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow-down)"/>
    
    <!-- 坐标轴标签 -->
    <text x="700" y="675" text-anchor="middle" class="axis-label" fill="#7F8C8D">维度 1 (t-SNE)</text>
    <text x="90" y="450" text-anchor="end" class="axis-label" fill="#7F8C8D">维度 2 (PCA)</text>
    
    <!-- 聚类区域 -->
    <ellipse cx="320" cy="540" rx="100" ry="65" fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,4"/>
    <ellipse cx="580" cy="500" rx="80" ry="55" fill="#27AE60" fill-opacity="0.08" stroke="#27AE60" stroke-width="2" stroke-dasharray="6,4"/>
    
    <!-- 聚类标签 -->
    <text x="320" y="625" text-anchor="middle" class="cluster-label" fill="#4A90D9">动物</text>
    <text x="580" y="570" text-anchor="middle" class="cluster-label" fill="#27AE60">水果</text>
    
    <!-- 散点（动物类） -->
    <circle cx="280" cy="520" r="7" fill="#4A90D9" filter="url(#softShadow)"/>
    <text x="270" y="500" text-anchor="end" class="label-text" fill="#2C3E50">猫</text>
    
    <circle cx="350" cy="560" r="7" fill="#4A90D9" filter="url(#softShadow)"/>
    <text x="365" y="570" text-anchor="start" class="label-text" fill="#2C3E50">狗</text>
    
    <!-- 散点（水果类） -->
    <circle cx="560" cy="480" r="7" fill="#27AE60" filter="url(#softShadow)"/>
    <text x="545" y="460" text-anchor="end" class="label-text" fill="#2C3E50">苹果</text>
    
    <circle cx="610" cy="510" r="7" fill="#27AE60" filter="url(#softShadow)"/>
    <text x="625" y="520" text-anchor="start" class="label-text" fill="#2C3E50">香蕉</text>
    
    <!-- 距离标注 -->
    <line x1="280" y1="520" x2="350" y2="560" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="315" y="530" text-anchor="middle" font-size="12" fill="#FF6B6B">距离近</text>
  </g>

  <!-- ================= 类比部分 ================= -->
  <g id="sec_analogy">
    <!-- 卡片 -->
    <rect x="40" y="740" width="720" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    
    <!-- 装饰条 -->
    <rect x="40" y="740" width="6" height="40" rx="3" fill="#FF6B6B" opacity="0.8"/>
    
    <!-- 标题 -->
    <text x="70" y="785" class="section-title">向量运算与类比推理</text>
    
    <!-- 正文 -->
    <text x="70" y="815" class="body-text">揭示词语间的内在关系，支持有意义的向量运算：</text>
    
    <!-- 左侧节点（国王、男人） -->
    <rect x="180" y="840" width="80" height="36" rx="8" fill="#FF6B6B" filter="url(#softShadow)"/>
    <text x="220" y="863" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold">国王</text>
    
    <rect x="180" y="910" width="80" height="36" rx="8" fill="#4A90D9" filter="url(#softShadow)"/>
    <text x="220" y="933" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold">男人</text>
    
    <!-- 右侧节点（王后、女人） -->
    <rect x="540" y="840" width="80" height="36" rx="8" fill="#FF6B6B" filter="url(#softShadow)"/>
    <text x="580" y="863" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold">王后</text>
    
    <rect x="540" y="910" width="80" height="36" rx="8" fill="#4A90D9" filter="url(#softShadow)"/>
    <text x="580" y="933" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold">女人</text>
    
    <!-- 垂直箭头（底部到顶部） -->
    <line x1="220" y1="910" x2="220" y2="885" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arrow-up)"/>
    <line x1="580" y1="910" x2="580" y2="885" stroke="#FF6B6B" stroke-width="2.5" marker-end="url(#arrow-up)"/>
    
    <!-- 箭头标签 -->
    <text x="235" y="895" font-size="14" fill="#FF6B6B" font-weight="bold">+ 皇室</text>
    <text x="540" y="895" font-size="14" fill="#FF6B6B" font-weight="bold">+ 皇室</text>
    
    <!-- 顶部连接箭头（可迁移关系） -->
    <line x1="265" y1="858" x2="530" y2="858" stroke="#7B68EE" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-analogy)"/>
    <text x="400" y="843" text-anchor="middle" font-size="14" fill="#7B68EE" font-weight="bold">关系可迁移</text>
    
    <!-- 底部公式框 -->
    <rect x="230" y="955" width="340" height="34" rx="17" fill="#F4F8FF" stroke="#D0DFFF" stroke-width="1.5"/>
    <text x="400" y="977" text-anchor="middle" font-family="monospace" font-size="16" fill="#4A90D9" font-weight="bold">king - man + woman ≈ queen</text>
  </g>

  <!-- ================= 页脚 ================= -->
  <g id="sec_footer">
    <!-- 背景条 -->
    <rect x="40" y="1020" width="720" height="50" rx="25" fill="#2C3E50" filter="url(#shadow)"/>
    
    <!-- 页脚文本 -->
    <text x="70" y="1050" class="footer-text" fill="#FFFFFF">作为 NLP 的基石技术，广泛应用于：</text>
    
    <!-- 应用标签 -->
    <rect x="370" y="1032" width="72" height="26" rx="13" fill="#4A90D9"/>
    <text x="406" y="1049" text-anchor="middle" class="chip-text">文本分类</text>
    
    <rect x="452" y="1032" width="72" height="26" rx="13" fill="#7B68EE"/>
    <text x="488" y="1049" text-anchor="middle" class="chip-text">情感分析</text>
    
    <rect x="534" y="1032" width="72" height="26" rx="13" fill="#27AE60"/>
    <text x="570" y="1049" text-anchor="middle" class="chip-text">问答系统</text>
    
    <rect x="616" y="1032" width="72" height="26" rx="13" fill="#F39C12"/>
    <text x="652" y="1049" text-anchor="middle" class="chip-text">机器翻译</text>
  </g>
</svg>