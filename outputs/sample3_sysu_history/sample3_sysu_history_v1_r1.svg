<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- 标题渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <!-- 卡片投影 -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
    
    <!-- 最终节点发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#B91C1C" flood-opacity="0.4"/>
    </filter>
    
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- 画布背景 -->
  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- 标题区 -->
  <g id="header">
    <rect x="0" y="0" width="800" height="144" fill="url(#headerGrad)"/>
    <circle cx="680" cy="30" r="70" fill="#FFFFFF" fill-opacity="0.05"/>
    <circle cx="720" cy="110" r="40" fill="#FFFFFF" fill-opacity="0.05"/>
    <circle cx="100" cy="80" r="80" fill="#FFFFFF" fill-opacity="0.03"/>
    
    <text x="400" y="70" text-anchor="middle" font-size="34" font-weight="bold" fill="#FFFFFF" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">中山大学发展历程</text>
    <text x="400" y="110" text-anchor="middle" font-size="20" font-weight="normal" fill="#E2E8F0" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">世纪中大，山高水长</text>
  </g>

  <!-- 主时间线区 -->
  <g id="main-timeline">
    <!-- 中央主干线条 -->
    <line x1="400" y1="180" x2="400" y2="1020" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="395,190 405,190 400,175" fill="#1E3A8A"/>

    <!-- 节点 1: 1924 年 (左侧) -->
    <g id="node1">
      <line x1="400" y1="250" x2="280" y2="250" stroke="#5B21B6" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="400" cy="250" r="22" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-opacity="0.3"/>
      <circle cx="400" cy="250" r="12" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="40" y="195" width="290" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="60" y="225" font-size="16" font-weight="bold" fill="#B91C1C" font-family="system-ui, sans-serif">1924 年</text>
      <text x="60" y="252" font-size="14" fill="#1E293B" font-family="system-ui, sans-serif">
        <tspan x="60" dy="0">孙中山先生创立国立广东大学</tspan>
        <tspan x="60" dy="24">后更名为国立中山大学。</tspan>
      </text>
    </g>

    <!-- 节点 2: 1937-1945 年 (右侧) -->
    <g id="node2">
      <line x1="400" y1="430" x2="520" y2="430" stroke="#5B21B6" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="400" cy="430" r="22" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-opacity="0.3"/>
      <circle cx="400" cy="430" r="12" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="470" y="375" width="290" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="490" y="405" font-size="16" font-weight="bold" fill="#B91C1C" font-family="system-ui, sans-serif">1937-1945 年</text>
      <text x="490" y="432" font-size="14" fill="#1E293B" font-family="system-ui, sans-serif">
        <tspan x="490" dy="0">抗战期间，学校先后迁至</tspan>
        <tspan x="490" dy="24">云南澄江、粤北坪石等地坚持办学。</tspan>
      </text>
    </g>

    <!-- 节点 3: 1952 年 (左侧) -->
    <g id="node3">
      <line x1="400" y1="610" x2="280" y2="610" stroke="#5B21B6" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="400" cy="610" r="22" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-opacity="0.3"/>
      <circle cx="400" cy="610" r="12" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="40" y="555" width="290" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="60" y="585" font-size="16" font-weight="bold" fill="#B91C1C" font-family="system-ui, sans-serif">1952 年</text>
      <text x="60" y="612" font-size="14" fill="#1E293B" font-family="system-ui, sans-serif">
        <tspan x="60" dy="0">全国院系调整，中山大学成为</tspan>
        <tspan x="60" dy="24">一所以文理科为主的综合性大学。</tspan>
      </text>
    </g>

    <!-- 节点 4: 2001 年 (右侧) -->
    <g id="node4">
      <line x1="400" y1="790" x2="520" y2="790" stroke="#5B21B6" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="400" cy="790" r="22" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-opacity="0.3"/>
      <circle cx="400" cy="790" r="12" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="470" y="735" width="290" height="110" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <text x="490" y="765" font-size="16" font-weight="bold" fill="#B91C1C" font-family="system-ui, sans-serif">2001 年</text>
      <text x="490" y="792" font-size="14" fill="#1E293B" font-family="system-ui, sans-serif">
        <tspan x="490" dy="0">中山大学与中山医科大学合并，</tspan>
        <tspan x="490" dy="24">形成了新的综合性学科格局。</tspan>
      </text>
    </g>

    <!-- 节点 5: 至今 (左侧，高亮突出) -->
    <g id="node5">
      <line x1="400" y1="970" x2="260" y2="970" stroke="#5B21B6" stroke-width="2" stroke-dasharray="4,4"/>
      <!-- 高亮外环 -->
      <circle cx="400" cy="970" r="32" fill="none" stroke="#B91C1C" stroke-width="2" stroke-opacity="0.4"/>
      <circle cx="400" cy="970" r="20" fill="#B91C1C" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)"/>
      <!-- 中心星形图标 -->
      <polygon points="400,961 403,968 411,968 405,973 407,980 400,976 393,980 395,973 389,968 397,968" fill="#FFFFFF"/>
      
      <!-- 高亮卡片 -->
      <rect x="40" y="885" width="310" height="130" rx="8" fill="#FFFFFF" filter="url(#shadow)" stroke="#F59E0B" stroke-width="2"/>
      <!-- 装饰星形 -->
      <polygon points="165,920 167,926 173,926 168,930 170,936 165,933 160,936 162,930 157,926 163,926" fill="#F59E0B"/>
      <text x="60" y="925" font-size="18" font-weight="bold" fill="#B91C1C" font-family="system-ui, sans-serif">至今</text>
      <text x="60" y="958" font-size="15" fill="#1E293B" font-family="system-ui, sans-serif">
        <tspan x="60" dy="0">国家“双一流”“985工程”</tspan>
        <tspan x="60" dy="26">“211工程”重点建设大学。</tspan>
      </text>
    </g>
  </g>

  <!-- 页脚区 -->
  <g id="footer">
    <rect x="0" y="1056" width="800" height="144" fill="#1E293B"/>
    <text x="400" y="1100" text-anchor="middle" font-size="24" font-weight="bold" fill="#F8FAFC" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">博学 审问 慎思 明辨 笃行</text>
    <text x="400" y="1140" text-anchor="middle" font-size="14" fill="#94A3B8" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">—— 中山大学校训 · 世纪中大，山高水长 ——</text>
    <line x1="200" y1="1160" x2="600" y2="1160" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.6"/>
  </g>
</svg>