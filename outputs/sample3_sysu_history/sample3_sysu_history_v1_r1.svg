<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <marker id="timelineArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2C3E50"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #FDFEFE; }
    .title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 32px; font-weight: bold; fill: #2C3E50; text-anchor: middle; }
    .subtitle { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 18px; fill: #7F8C8D; text-anchor: middle; }
    .year-label { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 16px; font-weight: bold; fill: #2C3E50; text-anchor: end; dominant-baseline: middle; }
    .year-label-special { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 16px; font-weight: bold; fill: #E74C3C; text-anchor: end; dominant-baseline: middle; }
    .card-title { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 18px; font-weight: bold; fill: #2C3E50; }
    .card-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #7F8C8D; }
    .footer-text { font-family: system-ui, -apple-system, 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #7F8C8D; text-anchor: middle; }
  </style>

  <!-- 背景 -->
  <rect class="bg" x="0" y="0" width="800" height="1200"/>

  <!-- 背景装饰 -->
  <circle cx="400" cy="-80" r="320" fill="#8E44AD" opacity="0.04"/>
  <circle cx="400" cy="1200" r="280" fill="#2C3E50" opacity="0.02"/>

  <!-- 标题区域 -->
  <text x="400" y="60" class="title">中山大学发展历程</text>
  <text x="400" y="105" class="subtitle">继承伟人志业，谱写时代新篇</text>
  <line x1="220" y1="125" x2="580" y2="125" stroke="#8E44AD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 时间线轴线 -->
  <line x1="180" y1="190" x2="180" y2="1070" stroke="#2C3E50" stroke-width="3" marker-end="url(#timelineArrow)"/>

  <!-- 1924 节点与卡片 -->
  <line x1="202" y1="260" x2="228" y2="260" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="180" cy="260" r="22" fill="#8E44AD" stroke="#FFFFFF" stroke-width="3" filter="url(#nodeShadow)"/>
  <text x="170" y="260" class="year-label">1924</text>
  <rect x="230" y="195" width="510" height="130" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="234" y="205" width="4" height="110" rx="2" fill="#8E44AD"/>
  <text x="260" y="227" class="card-title">孙中山先生创办国立广东大学</text>
  <text x="260" y="257" class="card-text">1924年成立，1926年更名为国立中山大学</text>

  <!-- 1952 节点与卡片 -->
  <line x1="202" y1="430" x2="228" y2="430" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="180" cy="430" r="22" fill="#8E44AD" stroke="#FFFFFF" stroke-width="3" filter="url(#nodeShadow)"/>
  <text x="170" y="430" class="year-label">1952</text>
  <rect x="230" y="365" width="510" height="130" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="234" y="375" width="4" height="110" rx="2" fill="#8E44AD"/>
  <text x="260" y="397" class="card-title">全国院系调整</text>
  <text x="260" y="427" class="card-text">原中山大学文理院系与岭南大学文理院系合并</text>

  <!-- 2000 节点与卡片 -->
  <line x1="202" y1="600" x2="228" y2="600" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="180" cy="600" r="22" fill="#8E44AD" stroke="#FFFFFF" stroke-width="3" filter="url(#nodeShadow)"/>
  <text x="170" y="600" class="year-label">2000</text>
  <rect x="230" y="535" width="510" height="130" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="234" y="545" width="4" height="110" rx="2" fill="#8E44AD"/>
  <text x="260" y="567" class="card-title">中山医科大学合并</text>
  <text x="260" y="597" class="card-text">2000年10月，与中山医科大学合并，医理融合</text>

  <!-- 今 节点与卡片 -->
  <line x1="202" y1="770" x2="228" y2="770" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="180" cy="770" r="22" fill="#E74C3C" stroke="#FFFFFF" stroke-width="3" filter="url(#nodeShadow)"/>
  <text x="170" y="770" class="year-label-special">今</text>
  <rect x="230" y="705" width="510" height="130" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="234" y="715" width="4" height="110" rx="2" fill="#E74C3C"/>
  <text x="260" y="737" class="card-title">三校区五校园办学格局</text>
  <text x="260" y="767" class="card-text">广州校区（南校园、北校园、东校园）</text>
  <text x="260" y="789" class="card-text">珠海校区、深圳校区</text>

  <!-- 荣誉 节点与卡片 -->
  <line x1="198" y1="940" x2="228" y2="940" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="180" cy="940" r="18" fill="#E74C3C" stroke="#FFFFFF" stroke-width="3" filter="url(#nodeShadow)"/>
  <text x="168" y="940" class="year-label-special" font-size="14">荣誉</text>
  <rect x="230" y="875" width="510" height="130" rx="8" fill="#FFFFFF" stroke="#EAEAEA" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="234" y="885" width="4" height="110" rx="2" fill="#E74C3C"/>
  <text x="260" y="907" class="card-title">国家“双一流”建设高校</text>
  <text x="260" y="937" class="card-text">“985工程”“211工程”重点建设高校</text>

  <!-- 页脚区域 -->
  <line x1="300" y1="1110" x2="500" y2="1110" stroke="#CCCCCC" stroke-width="1"/>
  <text x="400" y="1135" class="footer-text">中山大学 · 博学 审问 慎思 明辨 笃行</text>
</svg>