<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <!-- 滤镜 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#2C3E50" flood-opacity="0.08"/>
    </filter>
    
    <!-- 渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFEFE"/>
      <stop offset="100%" stop-color="#F8F4FC"/>
    </linearGradient>

    <!-- 样式 -->
    <style>
      .title { font-family: 'Microsoft YaHei', -apple-system, sans-serif; font-weight: bold; fill: #2C3E50; }
      .subtitle { font-family: 'Microsoft YaHei', -apple-system, sans-serif; fill: #7F8C8D; }
      .card-title { font-family: 'Microsoft YaHei', -apple-system, sans-serif; font-weight: bold; font-size: 18px; }
      .card-text { font-family: 'Microsoft YaHei', -apple-system, sans-serif; font-size: 15px; fill: #555555; line-height: 1.5; }
      .label { font-family: 'Microsoft YaHei', -apple-system, sans-serif; font-weight: bold; font-size: 16px; fill: #2C3E50; }
      .footer-text { font-family: 'Microsoft YaHei', -apple-system, sans-serif; font-size: 14px; fill: #7F8C8D; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="1200" fill="url(#bgGrad)"/>

  <!-- 装饰元素 -->
  <circle cx="0" cy="0" r="350" fill="#8E44AD" opacity="0.04"/>
  <circle cx="800" cy="1200" r="350" fill="#8E44AD" opacity="0.04"/>

  <!-- 标题部分 -->
  <g transform="translate(0, 40)">
    <text x="400" y="40" class="title" font-size="34" text-anchor="middle">中山大学发展历程</text>
    <text x="400" y="75" class="subtitle" font-size="16" text-anchor="middle">继承伟人志业，谱写时代新篇</text>
  </g>

  <!-- 时间轴线 -->
  <g>
    <line x1="200" y1="160" x2="200" y2="920" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 年代连线 -->
    <line x1="200" y1="200" x2="200" y2="340" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="380" x2="200" y2="520" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="560" x2="200" y2="700" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="740" x2="200" y2="880" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 时间节点与年份标签 -->
  <g>
    <!-- 1924 -->
    <circle cx="200" cy="180" r="18" fill="#8E44AD"/>
    <text x="165" y="186" class="label" text-anchor="end" dominant-baseline="middle">1924</text>
    
    <!-- 1952 -->
    <circle cx="200" cy="360" r="18" fill="#8E44AD"/>
    <text x="165" y="366" class="label" text-anchor="end" dominant-baseline="middle">1952</text>
    
    <!-- 2000 -->
    <circle cx="200" cy="540" r="18" fill="#8E44AD"/>
    <text x="165" y="546" class="label" text-anchor="end" dominant-baseline="middle">2000</text>
    
    <!-- 今 -->
    <circle cx="200" cy="720" r="22" fill="#E74C3C"/>
    <text x="160" y="726" class="label" font-size="18" text-anchor="end" dominant-baseline="middle" fill="#E74C3C">今</text>
    
    <!-- 荣誉 -->
    <circle cx="200" cy="900" r="22" fill="#E74C3C"/>
    <text x="155" y="906" class="label" text-anchor="end" dominant-baseline="middle" fill="#E74C3C">荣誉</text>
  </g>

  <!-- 事件卡片 -->
  <g>
    <!-- 卡片 1924 -->
    <g>
      <rect x="260" y="150" width="480" height="130" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
      <rect x="260" y="150" width="6" height="130" fill="#8E44AD" rx="3"/>
      <text x="285" y="175" class="card-title" fill="#8E44AD">1924年 · 创办</text>
      <text x="285" y="210" class="card-text">孙中山先生亲手创办国立广东大学</text>
      <text x="285" y="240" class="card-text">1926年更名为国立中山大学</text>
    </g>

    <!-- 卡片 1952 -->
    <g>
      <rect x="260" y="330" width="480" height="110" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
      <rect x="260" y="330" width="6" height="110" fill="#8E44AD" rx="3"/>
      <text x="285" y="355" class="card-title" fill="#8E44AD">1952年 · 院系调整</text>
      <text x="285" y="390" class="card-text">全国院系调整，原中山大学与岭南大学文理院系合并</text>
      <text x="285" y="420" class="card-text">组成新的中山大学</text>
    </g>

    <!-- 卡片 2000 -->
    <g>
      <rect x="260" y="510" width="480" height="120" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
      <rect x="260" y="510" width="6" height="120" fill="#8E44AD" rx="3"/>
      <text x="285" y="535" class="card-title" fill="#8E44AD">2000年 · 医理融合</text>
      <text x="285" y="570" class="card-text">原中山大学与中山医科大学合并</text>
      <text x="285" y="600" class="card-text">组建新的中山大学，医理优势互补</text>
    </g>

    <!-- 卡片 今 -->
    <g>
      <rect x="260" y="690" width="480" height="140" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
      <rect x="260" y="690" width="6" height="140" fill="#E74C3C" rx="3"/>
      <text x="285" y="715" class="card-title" fill="#E74C3C">办学格局</text>
      <text x="285" y="750" class="card-text">形成三校区五校园办学格局</text>
      <text x="285" y="780" class="card-text">广州校区（南校园、北校园、东校园）</text>
      <text x="285" y="810" class="card-text">珠海校区、深圳校区</text>
    </g>

    <!-- 卡片 荣誉 -->
    <g>
      <rect x="260" y="870" width="480" height="110" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#cardShadow)"/>
      <rect x="260" y="870" width="6" height="110" fill="#E74C3C" rx="3"/>
      <text x="285" y="895" class="card-title" fill="#E74C3C">学术地位</text>
      <text x="285" y="930" class="card-text">国家“双一流”建设高校</text>
      <text x="285" y="960" class="card-text">原“985工程”“211工程”重点建设高校</text>
    </g>
  </g>

  <!-- 页脚 -->
  <g>
    <text x="400" y="1070" class="footer-text" text-anchor="middle">中山大学 · 博学 审问 慎思 明辨 笃行</text>
  </g>
</svg>