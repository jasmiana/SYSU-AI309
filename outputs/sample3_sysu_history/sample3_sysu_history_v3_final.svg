<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" width="800" height="1120">
    <defs>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8E44AD"/>
            <stop offset="100%" stop-color="#2C3E50"/>
        </linearGradient>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
        <filter id="tlShadow" x="-2%" y="-2%" width="104%" height="104%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.05"/>
        </filter>
        <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
        </filter>
    </defs>

    <!-- 主背景 -->
    <rect width="800" height="1120" fill="#FDFEFE"/>

    <!-- 标题部分 -->
    <rect x="40" y="22" width="720" height="80" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
    <path d="M 40 22 L 40 102" stroke="#E74C3C" stroke-width="4" opacity="0.8"/>
    <text x="400" y="72" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">中山大学发展历程</text>

    <!-- 装饰分隔线 -->
    <rect x="40" y="110" width="720" height="2" fill="#8E44AD" opacity="0.3"/>

    <!-- 概述部分 -->
    <rect x="40" y="122" width="720" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="60" y="150" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">中山大学由孙中山先生于1924年创办，是中国南方最著名的高等学府之一。历经百年发展，学校从单一校区扩展为广州、珠海、深圳三校区五校园的宏大格局。</text>
    <text x="60" y="175" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2001年与原中山医科大学合并后学科门类更加齐全，2017年入选国家“双一流”建设高校A类。2024年迎来百年华诞。</text>

    <!-- 时间线部分 -->
    <rect x="40" y="222" width="720" height="850" rx="12" fill="#F4F6F7" filter="url(#tlShadow)"/>
    
    <!-- 背景水印 -->
    <text x="760" y="600" fill="#2C3E50" font-size="120" font-weight="bold" opacity="0.03" transform="rotate(-90 760 600)" font-family="sans-serif">100 YEARS</text>

    <!-- 时间线主轴 -->
    <line x1="120" y1="262" x2="120" y2="1052" stroke="#2C3E50" stroke-width="4"/>
    <rect x="110" y="262" width="20" height="790" fill="#8E44AD" opacity="0.05"/>

    <!-- 事件 1：1924（关键节点） -->
    <line x1="120" y1="262" x2="160" y2="262" stroke="#E74C3C" stroke-width="3" stroke-dasharray="4,2"/>
    <circle cx="160" cy="262" r="10" fill="#E74C3C" filter="url(#shadow)"/>
    <circle cx="160" cy="262" r="14" fill="#E74C3C" opacity="0.2"/>
    <rect x="172" y="252" width="62" height="24" rx="4" fill="#E74C3C" opacity="0.1"/>
    <text x="178" y="269" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1924</text>
    <text x="245" y="269" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">国立广东大学创立，孙中山先生亲手创办</text>

    <!-- 事件 2：1926 -->
    <line x1="120" y1="332" x2="160" y2="332" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="332" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="332" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="322" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="339" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1926</text>
    <text x="245" y="339" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">更名为国立中山大学，以纪念孙中山先生</text>

    <!-- 事件 3：1930 -->
    <line x1="120" y1="402" x2="160" y2="402" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="402" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="402" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="392" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="409" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1930</text>
    <text x="245" y="409" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">发展为文理工医农法多学科综合大学</text>

    <!-- 事件 4：1952（关键节点） -->
    <line x1="120" y1="472" x2="160" y2="472" stroke="#E74C3C" stroke-width="3" stroke-dasharray="4,2"/>
    <circle cx="160" cy="472" r="10" fill="#E74C3C" filter="url(#shadow)"/>
    <circle cx="160" cy="472" r="14" fill="#E74C3C" opacity="0.2"/>
    <rect x="172" y="462" width="62" height="24" rx="4" fill="#E74C3C" opacity="0.1"/>
    <text x="178" y="479" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1952</text>
    <text x="245" y="479" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">全国院系调整，成为文理科综合大学</text>

    <!-- 事件 5：1980 -->
    <line x1="120" y1="542" x2="160" y2="542" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="542" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="542" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="532" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="549" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1980</text>
    <text x="245" y="549" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">改革开放后迅速发展，扩大办学规模</text>

    <!-- 事件 6：2000 -->
    <line x1="120" y1="612" x2="160" y2="612" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="612" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="612" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="602" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="619" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2000</text>
    <text x="245" y="619" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">珠海校区正式启用，拓展办学空间</text>

    <!-- 事件 7：2001（关键节点） -->
    <line x1="120" y1="682" x2="160" y2="682" stroke="#E74C3C" stroke-width="3" stroke-dasharray="4,2"/>
    <circle cx="160" cy="682" r="10" fill="#E74C3C" filter="url(#shadow)"/>
    <circle cx="160" cy="682" r="14" fill="#E74C3C" opacity="0.2"/>
    <rect x="172" y="672" width="62" height="24" rx="4" fill="#E74C3C" opacity="0.1"/>
    <text x="178" y="689" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2001</text>
    <text x="245" y="689" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">与原中山医科大学合并，组建新的中山大学</text>

    <!-- 事件 8：2004 -->
    <line x1="120" y1="752" x2="160" y2="752" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="752" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="752" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="742" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="759" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2004</text>
    <text x="245" y="759" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">广州东校区（大学城校区）启用</text>

    <!-- 事件 9：2015 -->
    <line x1="120" y1="822" x2="160" y2="822" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="822" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="822" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="812" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="829" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2015</text>
    <text x="245" y="829" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">深圳校区启动建设，布局粤港澳大湾区</text>

    <!-- 事件 10：2017（关键节点） -->
    <line x1="120" y1="892" x2="160" y2="892" stroke="#E74C3C" stroke-width="3" stroke-dasharray="4,2"/>
    <circle cx="160" cy="892" r="10" fill="#E74C3C" filter="url(#shadow)"/>
    <circle cx="160" cy="892" r="14" fill="#E74C3C" opacity="0.2"/>
    <rect x="172" y="882" width="62" height="24" rx="4" fill="#E74C3C" opacity="0.1"/>
    <text x="178" y="899" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2017</text>
    <text x="245" y="899" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">入选国家“双一流”建设高校（A类）</text>

    <!-- 事件 11：2022 -->
    <line x1="120" y1="962" x2="160" y2="962" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="160" cy="962" r="8" fill="#8E44AD"/>
    <circle cx="160" cy="962" r="12" fill="#8E44AD" opacity="0.15"/>
    <rect x="172" y="952" width="62" height="24" rx="4" fill="#8E44AD" opacity="0.1"/>
    <text x="178" y="969" fill="#8E44AD" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2022</text>
    <text x="245" y="969" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">11个学科入选第二轮“双一流”建设名单</text>

    <!-- 事件 12：2024（关键节点） -->
    <line x1="120" y1="1032" x2="160" y2="1032" stroke="#E74C3C" stroke-width="3" stroke-dasharray="4,2"/>
    <circle cx="160" cy="1032" r="10" fill="#E74C3C" filter="url(#shadow)"/>
    <circle cx="160" cy="1032" r="14" fill="#E74C3C" opacity="0.2"/>
    <rect x="172" y="1022" width="62" height="24" rx="4" fill="#E74C3C" opacity="0.1"/>
    <text x="178" y="1039" fill="#E74C3C" font-size="16" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2024</text>
    <text x="245" y="1039" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">形成三校区五校园办学格局，百年校庆</text>

    <!-- 页脚部分 -->
    <rect x="40" y="1072" width="720" height="36" rx="6" fill="#2C3E50"/>
    <text x="400" y="1095" text-anchor="middle" fill="#FFFFFF" font-size="12" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">数据来源：中山大学官网 | 百年校庆：2024</text>
</svg>