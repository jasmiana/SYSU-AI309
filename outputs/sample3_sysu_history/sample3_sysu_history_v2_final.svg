<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="100%" height="100%">
  <defs>
    <!-- 标题背景渐变 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8E44AD"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>

    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- 时间线节点光晕效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 箭头定义 -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7F8C8D"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#FDFEFE"/>

  <!-- ================= 标题区 ================= -->
  <g id="title_section">
    <rect x="0" y="0" width="800" height="80" fill="url(#headerGrad)"/>
    <text x="400" y="48" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
      中山大学发展历程
    </text>
  </g>

  <!-- ================= 时间线区 ================= -->
  <g id="timeline_section">
    <!-- 垂直时间轴线 -->
    <line x1="400" y1="150" x2="400" y2="950" stroke="#8E44AD" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 装饰性虚线背景 -->
    <line x1="400" y1="150" x2="400" y2="950" stroke="#8E44AD" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>

    <!-- 1. 1924年（左侧） -->
    <g id="event_1924">
      <!-- 连接箭头 -->
      <line x1="388" y1="210" x2="340" y2="210" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框 -->
      <rect x="60" y="170" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="80" y="210" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        1924年，孙中山先生创办
      </text>
      <text x="80" y="230" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        国立广东大学
      </text>
      <!-- 节点 -->
      <circle cx="400" cy="210" r="12" fill="#8E44AD" filter="url(#glow)"/>
      <text x="400" y="215" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1924</text>
    </g>

    <!-- 2. 1926年（右侧） -->
    <g id="event_1926">
      <!-- 连接箭头 -->
      <line x1="412" y1="340" x2="460" y2="340" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框 -->
      <rect x="460" y="300" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="480" y="340" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        1926年，更名为国立中山大学
      </text>
      <!-- 节点 -->
      <circle cx="400" cy="340" r="12" fill="#8E44AD" filter="url(#glow)"/>
      <text x="400" y="345" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1926</text>
    </g>

    <!-- 3. 1952年（左侧） -->
    <g id="event_1952">
      <!-- 连接箭头 -->
      <line x1="388" y1="470" x2="340" y2="470" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框 -->
      <rect x="60" y="430" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="80" y="470" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        1952年，全国院系调整，
      </text>
      <text x="80" y="490" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        部分学科外迁
      </text>
      <!-- 节点 -->
      <circle cx="400" cy="470" r="12" fill="#8E44AD" filter="url(#glow)"/>
      <text x="400" y="475" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">1952</text>
    </g>

    <!-- 4. 2001年（右侧） -->
    <g id="event_2001">
      <!-- 连接箭头 -->
      <line x1="412" y1="600" x2="460" y2="600" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框 -->
      <rect x="460" y="560" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="480" y="600" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        2001年，与中山医科大学合并
      </text>
      <!-- 节点 -->
      <circle cx="400" cy="600" r="12" fill="#8E44AD" filter="url(#glow)"/>
      <text x="400" y="605" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2001</text>
    </g>

    <!-- 5. 2017年（左侧） -->
    <g id="event_2017">
      <!-- 连接箭头 -->
      <line x1="388" y1="730" x2="340" y2="730" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框 -->
      <rect x="60" y="690" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="80" y="730" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        2017年，入选双一流建设高校
      </text>
      <!-- 节点 -->
      <circle cx="400" cy="730" r="12" fill="#8E44AD" filter="url(#glow)"/>
      <text x="400" y="735" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2017</text>
    </g>

    <!-- 6. 2024年（右侧）- 强调节点 -->
    <g id="event_2024">
      <!-- 连接箭头 -->
      <line x1="412" y1="880" x2="460" y2="880" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrow)"/>
      <!-- 描述框（稍高一些以容纳两行文本） -->
      <rect x="460" y="840" width="280" height="80" rx="8" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#E0E0E0" stroke-width="1"/>
      <text x="480" y="865" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        2024年，百年校庆
      </text>
      <text x="480" y="888" fill="#2C3E50" font-size="14" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif" dominant-baseline="middle">
        三校区办学（广州、珠海、深圳）
      </text>
      <!-- 节点（尺寸较大，强调色） -->
      <circle cx="400" cy="880" r="18" fill="#E74C3C" filter="url(#glow)"/>
      <text x="400" y="886" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">2024</text>
    </g>
  </g>

  <!-- ================= 页脚区 ================= -->
  <g id="footer_section">
    <text x="760" y="985" text-anchor="end" fill="#7F8C8D" font-size="12" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
      数据来源：中山大学官网
    </text>
  </g>
</svg>